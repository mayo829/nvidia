                    <span className="text-zinc-500">⚡</span> Testing & Validation
                  </h3>
                  <ul className="space-y-3 list-none">
                    {qp.testing.map((item, i) => (
                      <li key={i} className="text-xs text-zinc-400 font-mono leading-relaxed [&_strong]:text-zinc-200 [&_a]:text-cyan-400 hover:[&_a]:text-cyan-300"
                          dangerouslySetInnerHTML={{ __html: item }} />
                    ))}
                  </ul>
                </div>
              </div>

              {/* Grading rubric */}
              <div className="bg-green-500/5 border border-green-500/20 rounded-lg p-5">
                <h3 className="text-[10px] font-black text-green-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                  <span>🎯</span> Tape-Out Standard Grading Rubric
                </h3>
                <p className="text-xs text-green-200/80 font-mono leading-relaxed">{qp.grading}</p>
              </div>

            </div>
          </div>
        </div>
      );
    }

    function PhaseAccordion({ phase, done, onToggle }) {
      const [open, setOpen] = useState(false);
      const stats = phaseStats(phase, done);
      const isComplete = stats.pct === 100;

      return (
        <div className={`border rounded-xl overflow-hidden transition-colors ${isComplete ? 'border-green-500/30' : 'border-zinc-800'}`}>
          <button
            onClick={() => setOpen(o => !o)}
            className="w-full flex items-center gap-4 p-5 hover:bg-zinc-900/50 transition-colors text-left"
          >
            <div
              className="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 text-sm font-bold text-black"
              style={{ background: isComplete ? '#4ade80' : phase.accent }}
            >
              {phase.number}
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap mb-1.5">
                <span className="font-semibold text-zinc-100">{phase.title}</span>
                <span className="text-xs text-zinc-500">{phase.subtitle}</span>
              </div>
              <ProgressBar pct={stats.pct} color={isComplete ? '#4ade80' : phase.accent} />
            </div>
            <div className="flex-shrink-0 text-right ml-4">
              <span className={`text-sm font-semibold ${isComplete ? 'text-green-400' : 'text-zinc-400'}`}>
                {stats.completed}/{stats.total}
              </span>
              <div className={`text-lg transition-transform duration-200 mt-1 ${open ? 'rotate-180' : ''} text-zinc-500`}>
                ↓
              </div>
            </div>
          </button>

          {open && (
            <div className="border-t border-zinc-800 bg-zinc-950/50 fade-in p-5">
              <p className="text-sm text-zinc-400 mb-6">{phase.goal}</p>
              {phase.months.map(month => (
                <MonthView key={month.id} phase={phase} month={month} done={done} onToggle={onToggle} />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ===================== TABS =====================
    function OverviewTab({ done, doneMap, total }) {
      const pct = Math.round(done / total * 100);
      return (
        <div className="fade-in w-full">
          <div className="mb-10">
            <span className="text-[11px] font-semibold tracking-widest uppercase text-zinc-500">Hybrid Hardware Roles @ NVIDIA</span>
            <h1 className="text-3xl font-bold text-zinc-50 mt-2 leading-tight">Strategic Architect Roadmap</h1>
            <p className="text-zinc-400 mt-3 leading-relaxed max-w-xl">
              A 12-month structured plan to build the skills and portfolio necessary to land a hybrid architecture and physical design role. Select any month from the sidebar to dive in.
            </p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-5 flex items-center gap-4 md:col-span-1">
              <div className="relative">
                <ProgressRing pct={pct} size={72} stroke={5} color="#22d3ee" />
                <div className="absolute inset-0 flex items-center justify-center">
                  <span className="text-sm font-bold text-zinc-100">{pct}%</span>
                </div>
              </div>
              <div>
                <p className="text-2xl font-bold text-zinc-50">{done}<span className="text-zinc-500 text-base font-normal">/{total}</span></p>
                <p className="text-xs text-zinc-500 mt-0.5">weeks complete</p>
              </div>
            </div>

            {PHASES.map(phase => {
              const s = phaseStats(phase, doneMap);
              return (
                <div key={phase.id} className="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
                  <div className="flex items-center gap-2 mb-2">
                    <div className="w-2 h-2 rounded-full" style={{ background: phase.accent }} />
                    <span className="text-xs font-medium text-zinc-300">Phase {phase.number}</span>
                  </div>
                  <p className="text-xs text-zinc-500 mb-3 leading-relaxed">{phase.title}</p>
                  <ProgressBar pct={s.pct} color={phase.accent} thin />
                  <p className="text-[11px] text-zinc-500 mt-1.5">{s.completed}/{s.total} weeks</p>
                </div>
              );
            })}
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[
              { label: 'Courses', value: '10', sub: 'across UMich, MIT, Stanford' },
              { label: 'Projects', value: '3', sub: 'portfolio deliverables' },
              { label: 'Weeks', value: '48', sub: 'structured learning' },
              { label: 'Phases', value: '4', sub: 'from theory to interview' },
            ].map(s => (
              <div key={s.label} className="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
                <p className="text-2xl font-bold text-zinc-50">{s.value}</p>
                <p className="text-xs font-medium text-zinc-300 mt-0.5">{s.label}</p>
                <p className="text-[11px] text-zinc-600 mt-1">{s.sub}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function FoundationsTab() {
      return (
        <div className="fade-in w-full">
          <div className="mb-8">
            <span className="text-[11px] font-semibold tracking-widest uppercase text-zinc-500">Section 1</span>
            <h2 className="text-2xl font-bold text-zinc-50 mt-1">Core Academic Foundations</h2>
            <p className="text-zinc-400 mt-2 text-sm leading-relaxed">A mathematically rigorous understanding of the underlying physics of computation is non-negotiable.</p>
          </div>
          <div className="space-y-4">
            {FOUNDATIONS.map(f => (
              <div key={f.id} className="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
                <div className="flex items-start gap-3 mb-4">
                  <span className="text-xl text-zinc-500 mt-0.5">{f.icon}</span>
                  <h3 className="text-base font-semibold text-zinc-100">{f.title}</h3>
                </div>
                <div className="space-y-3 mb-4">
                  {f.courses.map(c => (
                    <div key={c.name} className="flex items-start gap-3">
                      <div className="w-1 h-1 rounded-full bg-zinc-600 mt-2 flex-shrink-0" />
                      <div>
                        <a href={c.href} target="_blank" rel="noopener noreferrer"
                          className="text-sm font-medium text-cyan-400 hover:text-cyan-300 transition-colors">
                          {c.name}
                        </a>
                        <p className="text-xs text-zinc-500 mt-0.5 leading-relaxed">{c.desc}</p>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="bg-black/40 border border-zinc-800/60 rounded-lg px-4 py-3">
                  <span className="text-[10px] font-bold tracking-widest uppercase text-zinc-600">Why: </span>
                  <span className="text-xs text-zinc-400">{f.why}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ProjectsTab() {
      return (
        <div className="fade-in w-full">
          <div className="mb-8">
            <span className="text-[11px] font-semibold tracking-widest uppercase text-zinc-500">Section 2</span>
            <h2 className="text-2xl font-bold text-zinc-50 mt-1">High-Impact Portfolio Projects</h2>
            <p className="text-zinc-400 mt-2 text-sm leading-relaxed">Demonstrable execution targeting the intersection of parallel architecture, physical design, and automation.</p>
          </div>
          <div className="space-y-5">
            {PROJECTS.map(p => (
              <div key={p.id} className="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">
                <div className="flex items-center gap-4 p-5 border-b border-zinc-800/60">
                  <span className="text-3xl font-black text-zinc-700">{p.number}</span>
                  <div>
                    <div className="flex items-center gap-2 mb-1">
                      <h3 className="text-base font-semibold text-zinc-100">{p.title}</h3>
                    </div>
                    <Tag>{p.tag}</Tag>
                  </div>
                </div>
                <div className="p-5 space-y-4">
                  <div>
                    <span className="text-[10px] font-bold tracking-widest uppercase text-zinc-600">Objective</span>
                    <p className="text-sm text-zinc-300 mt-1.5 leading-relaxed">{p.objective}</p>
                  </div>
                  <div>
                    <span className="text-[10px] font-bold tracking-widest uppercase text-zinc-600">Execution Strategy</span>
                    <p className="text-sm text-zinc-400 mt-1.5 leading-relaxed">{p.strategy}</p>
                  </div>
                  <div className="bg-black/30 border border-zinc-800/50 rounded-lg px-4 py-3">
                    <span className="text-[10px] font-bold tracking-widest uppercase text-zinc-600">Strategic Value: </span>
                    <span className="text-xs text-zinc-400">{p.value}</span>
                  </div>
                  {p.links.length > 0 && (
                    <div className="flex gap-2 flex-wrap">
                      {p.links.map(l => (
                        <a key={l.href} href={l.href} target="_blank" rel="noopener noreferrer"
                          className="text-xs text-cyan-400 hover:text-cyan-300 underline underline-offset-2 transition-colors">
                          {l.label} ↗
                        </a>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function RoadmapTab({ done, onToggle }) {
      const total = 48;
      const completedCount = Object.values(done).filter(Boolean).length;
      const pct = Math.round(completedCount / total * 100);
      return (
        <div className="fade-in w-full">
          <div className="mb-6">
            <span className="text-[11px] font-semibold tracking-widest uppercase text-zinc-500">Section 3</span>
            <h2 className="text-2xl font-bold text-zinc-50 mt-1">12-Month Weekly Roadmap</h2>
            <p className="text-zinc-400 mt-2 text-sm">Click any week to mark it complete. Progress is saved automatically.</p>
          </div>

          <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-6">
            <div className="flex items-center justify-between mb-3">
              <span className="text-sm font-medium text-zinc-300">Overall Progress</span>
              <span className="text-sm font-bold text-zinc-100">{completedCount} <span className="text-zinc-500 font-normal">/ {total} weeks</span></span>
            </div>
            <ProgressBar pct={pct} color="#22d3ee" />
            <div className="flex justify-between mt-2">
              <span className="text-[11px] text-zinc-600">0%</span>
              <span className="text-[11px] font-semibold text-cyan-400">{pct}% complete</span>
              <span className="text-[11px] text-zinc-600">100%</span>
            </div>
          </div>

          <div className="space-y-3">
            {PHASES.map(phase => (
              <PhaseAccordion
                key={phase.id}
                phase={phase}
                done={done}
                onToggle={onToggle}
              />
            ))}
          </div>
        </div>
      );
    }

    function InterviewTab() {
      return (
        <div className="fade-in w-full">
          <div className="mb-8">
            <span className="text-[11px] font-semibold tracking-widest uppercase text-zinc-500">Section 4</span>
            <h2 className="text-2xl font-bold text-zinc-50 mt-1">Interview Preparation Tactics</h2>
            <p className="text-zinc-400 mt-2 text-sm leading-relaxed">NVIDIA evaluates four core competency pillars for hybrid architecture and physical design roles.</p>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {INTERVIEW_AREAS.map(area => (
              <div key={area.id} className="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
                <div className="flex items-start justify-between mb-4">
                  <h3 className="text-base font-semibold text-zinc-100">{area.title}</h3>
                  <Tag>{area.tag}</Tag>
                </div>
                <ul className="space-y-2.5">
                  {area.points.map((p, i) => (
                    <li key={i} className="flex items-start gap-2.5">
                      <span className="text-zinc-600 text-sm mt-0.5 flex-shrink-0">—</span>
                      <span className="text-sm text-zinc-400 leading-relaxed">{p}</span>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CitationsTab() {
      return (
        <div className="fade-in w-full">
          <div className="mb-8">
            <span className="text-[11px] font-semibold tracking-widest uppercase text-zinc-500">References</span>
            <h2 className="text-2xl font-bold text-zinc-50 mt-1">Works Cited</h2>
          </div>
          <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
            <ol className="space-y-3">
              {CITATIONS.map((c, i) => (
                <li key={i} className="flex items-baseline gap-3">
                  <span className="text-[11px] text-zinc-600 w-5 flex-shrink-0 text-right font-mono">{i + 1}.</span>
                  <a
                    href={c.href}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="text-sm text-cyan-400 hover:text-cyan-300 transition-colors leading-relaxed"
                  >
                    {c.label}
                  </a>
                </li>
              ))}
            </ol>
          </div>
        </div>
      );
    }

    // ===================== SIDEBAR =====================
    const TOP_NAV = [
      { id: 'overview',    label: 'Overview',      icon: '◈' },
    ];
    const BOT_NAV = [
      { id: 'foundations', label: 'Foundations',   icon: '⬡' },
      { id: 'projects',    label: 'Projects',      icon: '◆' },
      { id: 'interview',   label: 'Interview Prep', icon: '◇' },
      { id: 'citations',   label: 'Works Cited',    icon: '○' },
    ];

    function NavBtn({ id, label, icon, active, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center gap-3 px-4 py-2.5 text-sm transition-colors text-left ${
            active ? 'text-zinc-100 bg-zinc-800/70' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900/60'
          }`}
        >
          <span className="text-sm leading-none flex-shrink-0">{icon}</span>
          <span className="font-medium truncate">{label}</span>
          {active && <div className="ml-auto w-1 h-4 bg-cyan-400 rounded-full flex-shrink-0" />}
        </button>
      );
    }

    function Sidebar({ tab, setTab, totalDone, totalWeeks, done }) {
      const pct = Math.round(totalDone / totalWeeks * 100);
      const [expandedPhases, setExpandedPhases] = useState({});
      return (
        <aside className="w-60 flex-shrink-0 bg-zinc-950 border-r border-zinc-800 flex flex-col h-full overflow-hidden">

          {/* Logo */}
          <div className="px-4 py-4 border-b border-zinc-800 flex-shrink-0">
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 bg-cyan-400 rounded flex items-center justify-center flex-shrink-0">
                <span className="text-black font-black text-xs">N</span>
              </div>
              <div>
                <p className="text-xs font-bold text-zinc-100 leading-none">Project Hopper</p>
                <p className="text-[10px] text-zinc-500 mt-0.5">NVIDIA Architect Roadmap</p>
              </div>
            </div>
          </div>

          {/* Overview */}
          <div className="pt-1 flex-shrink-0">
            {TOP_NAV.map(n => (
              <NavBtn key={n.id} {...n} active={tab === n.id} onClick={() => setTab(n.id)} />
            ))}
          </div>

          {/* Roadmap timeline — scrollable, sits right below Overview */}
          <div className="border-t border-zinc-800/60 flex-1 overflow-y-auto">
            <div className="px-4 pt-3 pb-1">
              <span className="text-[9px] font-bold tracking-widest uppercase text-zinc-600">12-Month Roadmap</span>
            </div>
            {PHASES.map(phase => {
              const stats = phaseStats(phase, done);
              const isPhaseComplete = stats.pct === 100;
              const isExpanded = expandedPhases[phase.id];
              return (
                <div key={phase.id} className="mb-1">
                  {/* Phase header — clickable to expand */}
                  <button
                    onClick={() => setExpandedPhases(prev => ({ ...prev, [phase.id]: !prev[phase.id] }))}
                    className="w-full px-4 py-2 text-left hover:bg-zinc-900/40 transition-colors"
                  >
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-[9px] font-bold tracking-widest uppercase" style={{ color: isPhaseComplete ? '#4ade80' : phase.accent }}>
                        {phase.title}
                      </span>
                      <div className="flex items-center gap-1.5">
                        <span className="text-[9px] text-zinc-600">{stats.completed}/{stats.total}</span>
                        <span className={`text-zinc-600 text-[10px] transition-transform duration-200 ${isExpanded ? 'rotate-180' : ''}`}>▾</span>
                      </div>
                    </div>
                    <ProgressBar pct={stats.pct} color={isPhaseComplete ? '#4ade80' : phase.accent} thin />
                  </button>
                  {/* Month buttons + Capstone — only when expanded */}
                  {isExpanded && phase.months.map(month => {
                    const label = month.title.split(':')[0];
                    const allDone = month.weeks.every(w => done[w.id]);
                    const isActive = tab === month.id;
                    return (
                      <button
                        key={month.id}
                        onClick={() => setTab(month.id)}
                        className={`w-full flex items-center gap-2 pl-6 pr-3 py-1.5 text-left transition-colors ${
                          isActive ? 'bg-zinc-800/70 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900/60'
                        }`}
                      >
                        <span className={`w-[18px] h-[18px] rounded-full flex items-center justify-center flex-shrink-0 text-[9px] font-bold border ${
                          allDone
                            ? 'bg-green-500 border-green-500 text-black'
                            : isActive
                            ? 'border-zinc-500 text-zinc-300'
                            : 'border-zinc-700 text-zinc-600'
                        }`}>
                          {month.number}
                        </span>
                        <span className={`text-[11px] font-medium truncate ${allDone ? 'text-green-400' : ''}`}>
                          {label}
                        </span>
                        {isActive && <div className="ml-auto w-0.5 h-3 bg-cyan-400 rounded-full flex-shrink-0" />}
                      </button>
                    );
                  })}
                  {/* Capstone project button — only when expanded */}
                  {isExpanded && (() => {
                    const capId = phase.quarterId.toLowerCase();
                    const isActive = tab === capId;
                    return (
                      <button
                        key={capId}
                        onClick={() => setTab(capId)}
                        className={`w-full flex items-center gap-2 pl-6 pr-3 py-1.5 text-left transition-colors mb-2 ${
                          isActive ? 'bg-zinc-800/70' : 'text-zinc-600 hover:text-zinc-300 hover:bg-zinc-900/60'
                        }`}
                      >
                        <span className="text-[9px] flex-shrink-0" style={{ color: isActive ? phase.accent : '#52525b' }}>◆</span>
                        <span className="text-[11px] font-semibold truncate italic" style={{ color: isActive ? phase.accent : '#52525b' }}>
                          Capstone Project
                        </span>
                        {isActive && <div className="ml-auto w-0.5 h-3 rounded-full flex-shrink-0" style={{ background: phase.accent }} />}
                      </button>
                    );
                  })()}
                </div>
              );
            })}
          </div>

          {/* Bottom nav — Foundations, Projects, Interview, Citations */}
          <div className="border-t border-zinc-800/60 flex-shrink-0 pb-1">
            {BOT_NAV.map(n => (
              <NavBtn key={n.id} {...n} active={tab === n.id} onClick={() => setTab(n.id)} />
            ))}
          </div>

          {/* Overall progress */}
          <div className="px-4 py-3 border-t border-zinc-800 flex-shrink-0">
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-[9px] font-bold tracking-widest uppercase text-zinc-600">Overall Progress</span>
              <span className="text-[10px] font-semibold text-zinc-400">{pct}%</span>
            </div>
            <ProgressBar pct={pct} color="#22d3ee" thin />
            <p className="text-[9px] text-zinc-600 mt-1">{totalDone} / {totalWeeks} weeks complete</p>
          </div>
        </aside>
      );
    }

    // ===================== APP =====================
    function App() {
      const [tab, setTab] = useState('overview');
      const [done, setDone] = useState(() => load('completed-weeks', {}));

      useEffect(() => save('completed-weeks', done), [done]);

      const toggleWeek = useCallback((id) => {
        setDone(prev => ({ ...prev, [id]: !prev[id] }));
      }, []);

      const totalDone = Object.values(done).filter(Boolean).length;

      // Resolve month or quarter view from tab id
      let activePhase = null, activeMonth = null, activeQuarterPhase = null;
      for (const p of PHASES) {
        if (tab === p.quarterId.toLowerCase()) { activeQuarterPhase = p; }
        for (const m of p.months) {
          if (m.id === tab) { activePhase = p; activeMonth = m; }
        }
      }

      return (
        <div className="flex h-screen bg-black text-zinc-100 overflow-hidden font-sans antialiased">
          <Sidebar tab={tab} setTab={setTab} totalDone={totalDone} totalWeeks={48} done={done} />
          <main className="flex-1 overflow-y-auto h-full">
            <div className="p-6">
              {tab === 'overview'    && <OverviewTab done={totalDone} doneMap={done} total={48} />}
              {tab === 'foundations' && <FoundationsTab />}
              {tab === 'projects'    && <ProjectsTab />}
              {tab === 'interview'   && <InterviewTab />}
              {tab === 'citations'   && <CitationsTab />}
              {activePhase && activeMonth && (
                <MonthView phase={activePhase} month={activeMonth} done={done} onToggle={toggleWeek} />
              )}
              {activeQuarterPhase && (
                <QuarterView phase={activeQuarterPhase} />
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
