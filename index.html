    // ===================== ASSESSMENTS =====================
    function buildQuestionPool() {
      const pool = [];
      for (const phase of PHASES) {
        for (const month of phase.months) {
          for (const week of month.weeks) {
            if (week.assessment) {
              for (const q of week.assessment) {
                pool.push({ q: q.q, a: q.a, type: q.type || 'General', weekId: week.id, weekN: week.n });
              }
            }
          }
        }
      }
      if (typeof EXTRA_QUESTIONS !== 'undefined') {
        pool.push(...EXTRA_QUESTIONS);
      }
      return pool;
    }

    const QUESTION_POOL = buildQuestionPool();
    const CATEGORIES = [...new Set(QUESTION_POOL.map(q => q.type))].sort();

    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const CATEGORY_COLORS = {
      Architecture: '#22d3ee',
      RTL: '#a78bfa',
      Physical: '#fb923c',
      Verification: '#4ade80',
      Software: '#f472b6',
      General: '#facc15',
      Interview: '#60a5fa',
    };

    function AssessmentLineChart({ history }) {
      const chartRef = React.useRef(null);
      const canvasRef = React.useRef(null);
      const key = history.map(h => h.id).join(',');

      React.useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        const allCategories = [...new Set(history.flatMap(h => h.categories))].sort();
        const datasets = allCategories.map(cat => {
          const points = history
            .filter(h => h.categoryScores && h.categoryScores[cat] != null)
            .map(h => ({ x: new Date(h.completedAt).toLocaleDateString(), y: parseFloat(h.categoryScores[cat].toFixed(2)) }));
          return {
            label: cat,
            data: points,
            borderColor: CATEGORY_COLORS[cat] || '#94a3b8',
            backgroundColor: (CATEGORY_COLORS[cat] || '#94a3b8') + '22',
            borderWidth: 2,
            pointRadius: 4,
            tension: 0.3,
          };
        });
        chartRef.current = new Chart(canvasRef.current, {
          type: 'line',
          data: { datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                type: 'category',
                ticks: { color: '#71717a', font: { size: 10 } },
                grid: { color: 'rgba(255,255,255,0.05)' },
              },
              y: {
                min: 1,
                max: 5,
                ticks: { color: '#71717a', stepSize: 1, font: { size: 10 } },
                grid: { color: 'rgba(255,255,255,0.05)' },
              }
            },
            plugins: {
              legend: { display: true, labels: { color: '#a1a1aa', font: { size: 10 }, boxWidth: 12 } },
              tooltip: {
                backgroundColor: '#18181b', borderColor: '#27272a', borderWidth: 1,
                callbacks: { label: ctx => `${ctx.dataset.label}: ${Number(ctx.raw.y).toFixed(1)}/5` }
              }
            }
          }
        });
        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [key]);

      return <div className="w-full h-[240px] relative"><canvas ref={canvasRef}></canvas></div>;
    }

    function ActiveAssessment({ session, onSaveProgress, onComplete, onAbandon }) {
      const [currentIdx, setCurrentIdx] = React.useState(session.currentIndex || 0);
      const [userAnswer, setUserAnswer] = React.useState('');
      const [revealed, setRevealed] = React.useState(false);
      const [questions, setQuestions] = React.useState(session.questions);

      React.useEffect(() => {
        setUserAnswer(questions[currentIdx]?.userAnswer || '');
        setRevealed(false);
      }, [currentIdx]);

      const currentQ = questions[currentIdx];
      const totalQ = questions.length;
      const isLast = currentIdx === totalQ - 1;
      const answeredCount = questions.filter(q => q.score != null).length;
      const color = CATEGORY_COLORS[currentQ.type] || '#94a3b8';

      const handleReveal = () => {
        const updated = questions.map((q, i) => i === currentIdx ? { ...q, userAnswer } : q);
        setQuestions(updated);
        setRevealed(true);
        onSaveProgress({ ...session, questions: updated, currentIndex: currentIdx });
      };

      const handleGrade = (score) => {
        const updated = questions.map((q, i) => i === currentIdx ? { ...q, userAnswer, score } : q);
        setQuestions(updated);
        onSaveProgress({ ...session, questions: updated, currentIndex: currentIdx });
        if (isLast) {
          onComplete(updated);
        } else {
          const next = currentIdx + 1;
          setCurrentIdx(next);
          onSaveProgress({ ...session, questions: updated, currentIndex: next });
        }
      };

      return (
        <div className="fade-in max-w-3xl">
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-2xl font-bold text-zinc-50">Assessment</h2>
              <div className="flex items-center gap-2 mt-0.5 flex-wrap">
                {session.categories.map(cat => (
                  <span key={cat} className="text-[9px] font-bold tracking-widest uppercase" style={{ color: CATEGORY_COLORS[cat] || '#94a3b8' }}>{cat}</span>
                ))}
              </div>
            </div>
            <button
              onClick={onAbandon}
              className="text-zinc-600 hover:text-red-400 text-xs transition-colors px-3 py-1.5 border border-zinc-800 hover:border-red-900/50 rounded-lg"
            >
              Abandon
            </button>
          </div>

          {/* Progress Bar */}
          <div className="mb-6">
            <div className="flex items-center justify-between text-xs text-zinc-600 mb-1.5">
              <span>Question {currentIdx + 1} of {totalQ}</span>
              <span>{answeredCount} graded</span>
            </div>
            <div className="w-full bg-zinc-800 rounded-full h-1.5">
              <div className="h-full rounded-full transition-all duration-500 bg-cyan-400" style={{ width: `${(currentIdx / totalQ) * 100}%` }} />
            </div>
          </div>

          {/* Question Card */}
          <div className="bg-zinc-900/50 border border-zinc-800 rounded-xl overflow-hidden mb-4">
            <div className="p-5 border-b border-zinc-800">
              <div className="flex items-center gap-2 mb-3">
                <span className="text-[9px] font-bold tracking-widest uppercase px-2 py-0.5 rounded border"
                  style={{ color, borderColor: color + '40', background: color + '15' }}>
                  {currentQ.type}
                </span>
                <span className="text-[10px] text-zinc-600">Week {currentQ.weekN}</span>
              </div>
              <p className="text-zinc-100 font-medium text-sm leading-relaxed">{currentQ.q}</p>
            </div>

            <div className="p-5">
              <label className="block text-[10px] font-bold tracking-widest uppercase text-zinc-600 mb-2">Your Answer</label>
              <textarea
                value={userAnswer}
                onChange={e => setUserAnswer(e.target.value)}
                disabled={revealed}
                rows={5}
                placeholder="Type your answer here before revealing..."
                className="w-full bg-zinc-900 border border-zinc-700 rounded-lg p-3 text-sm text-zinc-200 resize-y focus:outline-none focus:border-zinc-500 placeholder-zinc-700 disabled:opacity-60 disabled:cursor-not-allowed transition-colors"
              />
            </div>

            {!revealed && (
              <div className="px-5 pb-5">
                <button
                  onClick={handleReveal}
                  className="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-lg text-sm font-medium transition-colors border border-zinc-700"
                >
                  Reveal Answer
                </button>
              </div>
            )}
          </div>

          {/* Revealed Answer & Grading */}
          {revealed && (
            <div className="fade-in bg-zinc-900/50 border border-zinc-800 rounded-xl p-5 mb-4">
              <div className="text-[10px] font-bold tracking-widest uppercase text-zinc-600 mb-3">Model Answer</div>
              <p className="text-zinc-300 text-sm leading-relaxed">{currentQ.a}</p>

              <div className="mt-5 border-t border-zinc-800 pt-5">
                <div className="text-[10px] font-bold tracking-widest uppercase text-zinc-600 mb-3">
                  Grade Your Response &nbsp;·&nbsp; 1 = Poor &nbsp; 5 = Perfect
                </div>
                <div className="flex items-center gap-2">
                  {[1, 2, 3, 4, 5].map(score => {
                    const sc = score <= 2 ? '#f87171' : score === 3 ? '#facc15' : '#4ade80';
                    return (
                      <button
                        key={score}
                        onClick={() => handleGrade(score)}
                        className="flex-1 py-3 rounded-lg border text-sm font-bold transition-all hover:scale-105 active:scale-95"
                        style={{ borderColor: sc + '60', color: sc, background: sc + '15' }}
                      >
                        {score}
                      </button>
                    );
                  })}
                </div>
                <div className="flex justify-between text-[10px] text-zinc-700 mt-1.5 px-1">
                  <span>Poor</span>
                  <span>Average</span>
                  <span>Perfect</span>
                </div>
              </div>
            </div>
          )}

          {/* Completion teaser */}
          {isLast && !revealed && (
            <div className="text-[11px] text-zinc-600 text-center py-2">This is the last question. Reveal and grade to complete the assessment.</div>
          )}
        </div>
      );
    }

    function AssessmentsTab() {
      const [view, setView] = React.useState('dashboard');
      const [history, setHistory] = React.useState(() => load('assessment_history', []));
      const [activeSession, setActiveSession] = React.useState(() => load('active_assessment', null));

      const handleStart = () => setView('setup');
      const handleResume = () => setView('active');
      const handleCancel = () => setView('dashboard');

      const handleBegin = (categories, count) => {
        const filtered = shuffleArray(QUESTION_POOL.filter(q => categories.includes(q.type))).slice(0, count);
        const session = {
          id: Date.now(),
          categories,
          questions: filtered.map(q => ({ ...q, userAnswer: '', score: null })),
          currentIndex: 0,
          startedAt: new Date().toISOString(),
        };
        setActiveSession(session);
        save('active_assessment', session);
        setView('active');
      };

      const handleSaveProgress = (session) => {
        setActiveSession(session);
        save('active_assessment', session);
      };

      const handleComplete = (answeredQuestions) => {
        const categoryScores = {};
        const categoryCounts = {};
        for (const q of answeredQuestions) {
          if (q.score != null) {
            if (!categoryScores[q.type]) { categoryScores[q.type] = 0; categoryCounts[q.type] = 0; }
            categoryScores[q.type] += q.score;
            categoryCounts[q.type]++;
          }
        }
        const avgCategoryScores = {};
        for (const cat of Object.keys(categoryScores)) {
          avgCategoryScores[cat] = categoryScores[cat] / categoryCounts[cat];
        }
        const allScores = answeredQuestions.filter(q => q.score != null).map(q => q.score);
        const avgScore = allScores.length ? allScores.reduce((a, b) => a + b, 0) / allScores.length : 0;

        const completed = {
          id: activeSession.id,
          categories: activeSession.categories,
          completedAt: new Date().toISOString(),
          totalQuestions: answeredQuestions.length,
          avgScore,
          categoryScores: avgCategoryScores,
          questions: answeredQuestions,
        };

        const newHistory = [...history, completed];
        setHistory(newHistory);
        save('assessment_history', newHistory);
        setActiveSession(null);
        save('active_assessment', null);
        setView('dashboard');
      };

      const handleAbandon = () => {
        if (!window.confirm('Abandon this assessment? All progress so far will be lost.')) return;
        setActiveSession(null);
        save('active_assessment', null);
        setView('dashboard');
      };

      if (view === 'setup') return <AssessmentSetup onBegin={handleBegin} onCancel={handleCancel} />;
      if (view === 'active' && activeSession) return (
        <ActiveAssessment
          session={activeSession}
          onSaveProgress={handleSaveProgress}
          onComplete={handleComplete}
          onAbandon={handleAbandon}
        />
      );
      return <AssessmentDashboard history={history} onStart={handleStart} onResume={handleResume} activeSession={activeSession} />;
    }

            >
              <span className="text-sm leading-none flex-shrink-0 text-zinc-500">○</span>
              <span className={`text-sm font-medium flex-1 truncate ${refActive ? 'text-zinc-100' : 'text-zinc-500 hover:text-zinc-300'}`}>
                Reference
              </span>
              <span className={`text-zinc-600 text-[10px] transition-transform duration-200 flex-shrink-0 ${referenceExpanded ? 'rotate-180' : ''}`}>▾</span>
              {refActive && !referenceExpanded && (
                <div className="w-1 h-4 bg-cyan-400 rounded-full flex-shrink-0" />
              )}
            </button>
            {referenceExpanded && (
              <div className="pb-1">
                {BOT_NAV.map(n => {
                  const isActive = tab === n.id;
                  return (
                    <button
                      key={n.id}
                      onClick={() => setTab(n.id)}
                      className={`w-full flex items-center gap-2 pl-6 pr-3 py-1.5 text-left transition-colors ${
                        isActive ? 'bg-zinc-800/70 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900/60'
                      }`}
                    >
                      <span className="text-[9px] text-zinc-600 flex-shrink-0">{n.icon}</span>
                      <span className="text-[11px] font-medium truncate">{n.label}</span>
                      {isActive && <div className="ml-auto w-0.5 h-3 bg-cyan-400 rounded-full flex-shrink-0" />}
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {/* Overall progress */}
          <div className="px-4 py-3 border-t border-zinc-800 flex-shrink-0">
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-[9px] font-bold tracking-widest uppercase text-zinc-600">Overall Progress</span>
              <span className="text-[10px] font-semibold text-zinc-400">{pct}%</span>
            </div>
            <ProgressBar pct={pct} color="#22d3ee" thin />
            <p className="text-[9px] text-zinc-600 mt-1">{totalDone} / {totalWeeks} weeks complete</p>
          </div>
        </aside>
      );
    }

    // ===================== APP =====================
    function App() {
      const [tab, setTab] = useState('overview');
      const [done, setDone] = useState(() => {
        const local = load('completed-weeks', {});
        return { ...local, ...COMPLETED_WEEKS };
      });

      useEffect(() => {
        save('completed-weeks', done);
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          fetch('/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(done)
          }).catch(err => console.error('Failed to save to file:', err));
        }
      }, [done]);

      const toggleWeek = useCallback((id) => {
        setDone(prev => ({ ...prev, [id]: !prev[id] }));
      }, []);

      const totalDone = Object.values(done).filter(Boolean).length;

      // Resolve month, quarter, or project view from tab id
      let activePhase = null, activeMonth = null, activeQuarterPhase = null;
      for (const p of PHASES) {
        if (tab === p.quarterId.toLowerCase()) { activeQuarterPhase = p; }
        for (const m of p.months) {
          if (m.id === tab) { activePhase = p; activeMonth = m; }
        }
      }
      const activeProject = PROJECTS.find(p => p.id === tab) || null;

      return (
        <div className="flex h-screen bg-black text-zinc-100 overflow-hidden font-sans antialiased">
          <Sidebar tab={tab} setTab={setTab} totalDone={totalDone} totalWeeks={48} done={done} />
          <main className="flex-1 overflow-y-auto h-full">
            <div className="p-6">
              {tab === 'overview'    && <OverviewTab done={totalDone} doneMap={done} total={48} />}
              {tab === 'foundations' && <FoundationsTab />}
              {tab === 'projects'    && <ProjectsOverviewTab />}
              {tab === 'interview'   && <InterviewTab />}
              {tab === 'citations'   && <CitationsTab />}
              {tab === 'assessments' && <AssessmentsTab />}
              {activeProject && <ProjectView project={activeProject} />}
              {activePhase && activeMonth && (
                <MonthView phase={activePhase} month={activeMonth} done={done} onToggle={toggleWeek} />
              )}
              {activeQuarterPhase && (
                <QuarterView phase={activeQuarterPhase} />
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
