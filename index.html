        accent: '#22d3ee', quarterId: 'Q1',
        months: [
          {
            id: 'm1', number: 1, title: 'Fundamentals & Toolchain Setup',
            intro: "Rebuild your mental models from UMich EECS 370/470 and transition to modern industry toolchains.",

            skills: [60, 40, 10, 20, 20],
            weeks: [
              { id: 'w1', n: 1, task: "<strong>SystemVerilog Refresh:</strong> Master SV datatypes (logic, struct, enum, interface) over legacy Verilog. Read IEEE 1800 LRM Ch 3-9.", subtasks: ["Set up a local Git repository for Q1 RTL development.", "Write a SV package defining standard ALU opcodes using <strong>enum</strong> and typed structures.", "Implement a basic ALU module utilizing SV <strong>always_comb</strong> and standard interfaces.", "Compile the ALU using Verilator to verify strict SV syntax compliance."] , assessment: [{"type": "RTL", "q": "What is the difference between `logic` and `reg`/`wire` in SystemVerilog?", "a": "`logic` is a 4-state data type (0, 1, X, Z) that can be driven by a single continuous assignment or procedural block. It replaces the need to strictly distinguish between `reg` (used in procedural blocks) and `wire` (used in continuous assignments) in most cases, preventing multiple-driver issues at compile time."}, {"type": "RTL", "q": "Explain the difference between `==` and `===` in SystemVerilog.", "a": "`==` is logical equality. If either operand contains an X or Z, the result is X (unknown). `===` is case equality. It performs a bit-by-bit comparison including X and Z states, returning 1 only if they match exactly, and 0 otherwise. `===` is typically used in testbenches, not synthesizable RTL."}, {"type": "Architecture", "q": "What is the purpose of an Instruction Set Architecture (ISA)?", "a": "The ISA serves as the contract between software and hardware. It defines the set of instructions, data types, registers, memory architecture, and interrupt/exception handling that a programmer (or compiler) can use, allowing different hardware microarchitectures to execute the same compiled binaries."}] },
              { id: 'w2', n: 2, task: "<strong>Simulation Setup:</strong> Install <a href='https://verilator.org/' target='_blank' class='text-cyan-400 hover:underline'>Verilator</a> and GTKWave. Open-source C++ simulation is required for complex SoCs.", subtasks: ["Install Verilator (v5+) and GTKWave on an Ubuntu/WSL2 environment.", "Write a basic C++ testbench wrapper (`sim_main.cpp`) to step the clock and dump VCD files.", "Integrate the C++ testbench with a Makefile for rapid compilation.", "View the generated waveform in GTKWave to confirm signal toggling."] , assessment: [{"type": "Verification", "q": "Why use Verilator (C++) over traditional event-driven simulators like ModelSim for complex SoCs?", "a": "Verilator is a cycle-accurate, 2-state simulator that compiles Verilog/SystemVerilog into highly optimized C++ or SystemC code. It is significantly faster (often 10x-100x) than event-driven simulators for large designs because it evaluates logic level-by-level per clock cycle rather than tracking individual signal events, making it ideal for software-driven SoC verification."}, {"type": "Verification", "q": "What is a VCD file and why is it useful?", "a": "VCD (Value Change Dump) is an ASCII-based format for dumping simulation waveform data. It records the changes in value of variables over time. It is essential for debugging RTL as it allows engineers to visualize signal transitions cycle-by-cycle using tools like GTKWave."}, {"type": "RTL", "q": "How do you implement a parameterized module in SystemVerilog?", "a": "Using the `#(parameter NAME = DEFAULT_VALUE)` syntax in the module declaration. This allows you to instantiate the module with different configurations (e.g., varying data widths or FIFO depths) without rewriting the core logic, promoting highly reusable code."}] },
              { id: 'w3', n: 3, task: "<strong>Clock Domain Crossing (CDC):</strong> Understand metastability. Build a parameterized Async FIFO. This is a guaranteed interview question.", subtasks: ["Implement dual-flop synchronizer modules for CDC.", "Code the Gray-code read/write pointer logic to prevent multi-bit transition errors.", "Assemble the parameterized Async FIFO utilizing an SRAM-based circular buffer.", "Simulate the FIFO in Verilator with asynchronous read and write clocks to verify data integrity."] , assessment: [{"type": "RTL", "q": "Draw/describe a 2-flop synchronizer. Why 2 flops?", "a": "A 2-flop synchronizer consists of two D-flip-flops in series clocked by the receiving domain's clock. The first flop samples the asynchronous input and may go metastable. The second flop gives the first flop an entire clock cycle to resolve to a stable state (0 or 1) before the signal is used by the receiving logic, drastically reducing the Mean Time Between Failures (MTBF)."}, {"type": "RTL", "q": "Why must an asynchronous FIFO use Gray code for its read and write pointers?", "a": "In Gray code, only one bit changes at a time between consecutive values. When passing a multi-bit pointer across clock domains, if binary encoding were used, multiple bits could transition simultaneously. Due to routing delays, the receiving domain might sample a transitional, completely invalid pointer value. Gray code ensures that even if sampled during a transition, the value is off by at most one position, which is safe for full/empty flag generation."}, {"type": "Physical", "q": "What is metastability?", "a": "Metastability occurs when a flip-flop's setup or hold time is violated (e.g., an asynchronous signal transitions exactly on the clock edge). The flip-flop's output hovers at an intermediate voltage level between 0 and 1 for an unpredictable amount of time before randomly settling, potentially causing downstream logic to read inconsistent values."}] },
              { id: 'w4', n: 4, task: "<strong>RTL Rigor:</strong> Complete 100% of the <a href='https://hdlbits.01xz.net/' target='_blank' class='text-cyan-400 hover:underline'>HDLBits</a> SystemVerilog sections.", subtasks: ["Complete the 'SystemVerilog Construct' and 'Vectors' sections.", "Complete all complex State Machine (FSM) sequence detector problems.", "Review and refactor any legacy Verilog habits into modern SV practices.", "Commit a summary log of common pitfalls to your personal documentation hub."] , assessment: [{"type": "RTL", "q": "What is the difference between a Mealy and a Moore state machine?", "a": "In a Moore machine, the outputs depend ONLY on the current state. In a Mealy machine, the outputs depend on both the current state AND the current inputs. Mealy machines can react faster (in the same cycle as the input change) but can create long combinational paths and potential combinational loops if connected to other Mealy machines."}, {"type": "RTL", "q": "Why should you use `always_ff` and `always_comb` instead of just `always`?", "a": "`always_ff` explicitly declares intent for sequential logic (flip-flops) and forces the synthesis tool/linter to check for edge-triggered sensitivity lists. `always_comb` explicitly declares combinational logic, automatically infers the sensitivity list for all read variables, and throws an error if a latch is inferred, preventing common Verilog bugs."}, {"type": "RTL", "q": "What is one-hot encoding and what are its trade-offs?", "a": "One-hot encoding uses one flip-flop per state (e.g., 4 states = 4 bits: 0001, 0010, 0100, 1000). Trade-off: It uses more flip-flops than binary encoding, but the next-state and output decode logic is extremely simple and fast (often just a few gates), making it ideal for high-frequency designs."}] }

            intro: "Apply EECS 470 concepts (Tomasulo's) into synthesizable RTL for your RISC-V core.",
            milestone: "Complete the Core Datapath. Implement Instruction Fetch, Decode, Reservation Stations, and basic Reorder Buffer (ROB).",

            skills: [75, 60, 15, 25, 30],
            weeks: [
              { id: 'w5', n: 5, task: "<strong>Decode & Issue:</strong> Implement the RV32IM decoder. Build a 2-way dispatch unit.", subtasks: ["Write the instruction fetch (IF) stage with a basic program counter (PC) logic.", "Implement the RV32IM decode logic to extract opcodes, registers, and immediates.", "Design a 2-way superscalar dispatch unit to issue independent instructions.", "Verify the decoder against a suite of standard RISC-V assembly instructions."] , assessment: [{"type": "Architecture", "q": "What is the purpose of the Decode stage in a RISC-V pipeline?", "a": "The Decode stage takes the fetched 32-bit instruction word, extracts the opcode, funct3, and funct7 fields to determine the instruction type, reads the source operands from the Register File, and generates the necessary control signals for the execution units (ALU op, memory read/write, branch type)."}, {"type": "Architecture", "q": "What is a superscalar processor?", "a": "A superscalar processor can issue and execute multiple instructions in a single clock cycle. It achieves this by having multiple parallel execution units (e.g., two ALUs) and complex fetch/decode logic capable of identifying independent instructions that can run simultaneously, increasing the Instructions Per Cycle (IPC)."}, {"type": "RTL", "q": "How do you handle data hazards in a pipelined datapath?", "a": "Data hazards (Read-After-Write) are handled primarily through Data Forwarding (bypassing), where the result of an ALU operation is routed directly back to the execution stage for the next instruction before it is written to the register file. If forwarding isn't possible (e.g., Load-Use hazard), the pipeline must be stalled (inserting bubbles) until the data is ready."}] },
              { id: 'w6', n: 6, task: "<strong>Tomasulo Implementation:</strong> Code parameterized Reservation Stations for ALUs and Branch units.", subtasks: ["Define the Reservation Station (RS) data structures using SV structs.", "Implement the Common Data Bus (CDB) broadcasting logic for result forwarding.", "Write the issue logic to allocate available RS entries and rename registers.", "Simulate a sequence of dependent instructions to verify out-of-order execution."] , assessment: [{"type": "Architecture", "q": "Explain the core concept of Tomasulo's Algorithm.", "a": "Tomasulo's algorithm enables out-of-order execution by using hardware register renaming to eliminate False Dependencies (Write-After-Write and Write-After-Read). It uses Reservation Stations to buffer instructions and their operands until all data is ready, and a Common Data Bus (CDB) to broadcast results to all waiting instructions simultaneously."}, {"type": "Architecture", "q": "What is a Reservation Station (RS)?", "a": "A Reservation Station is a buffer associated with a specific execution unit (like an ALU). It holds a dispatched instruction and its operands. If an operand is not yet available, the RS holds a 'tag' pointing to the RS that will eventually produce the value. The instruction waits in the RS until all operands are valid before executing."}, {"type": "RTL", "q": "How does the Common Data Bus (CDB) work?", "a": "The CDB is a broadcast bus. When an execution unit finishes, it puts its result and its unique tag on the CDB. All Reservation Stations monitor the CDB. If an RS sees a tag it is waiting for, it grabs the associated data. This allows results to bypass the register file and go directly to dependent instructions."}] },
              { id: 'w7', n: 7, task: "<strong>Reorder Buffer (ROB):</strong> Design the circular buffer for in-order commit and precise exception handling.", subtasks: ["Design the ROB circular queue to track instruction completion status.", "Implement the commit logic to update the architectural register file in-order.", "Add exception handling logic to flush the ROB and pipeline on a branch mispredict.", "Run a testbench verifying precise state recovery after simulated exceptions."] , assessment: [{"type": "Architecture", "q": "What is the purpose of a Reorder Buffer (ROB)?", "a": "The ROB enables precise exceptions and in-order commit in an out-of-order processor. While instructions execute out-of-order, their results are written to the ROB (a circular FIFO). The ROB only commits results to the architectural register file in the original program order. If an exception or branch misprediction occurs, the ROB is flushed, discarding speculative state."}, {"type": "Architecture", "q": "How does register renaming solve WAW and WAR hazards?", "a": "Write-After-Write (WAW) and Write-After-Read (WAR) are 'name dependencies' caused by reusing a limited number of architectural registers. Renaming maps architectural registers to a larger pool of physical registers (or ROB entries). Because every new write gets a unique physical location, older reads can safely access the old value, and subsequent writes don't overwrite pending data."}, {"type": "RTL", "q": "How do you implement a circular buffer (like a ROB) in RTL?", "a": "Using an SRAM array (or register file) with a Head pointer and a Tail pointer. Dispatching an instruction advances the Tail pointer. Committing an instruction advances the Head pointer. The buffer is full when `Tail + 1 == Head` (modulo buffer size), and empty when `Head == Tail`."}] },
              { id: 'w8', n: 8, task: "<strong>Memory Subsystem:</strong> Design a basic direct-mapped L1 Data Cache with stall logic.", subtasks: ["Implement the SRAM arrays for cache tags and data storage.", "Write the cache controller FSM to handle read/write hits and misses.", "Integrate stall signals into the core pipeline to pause execution on a miss.", "Verify cache behavior using a memory-intensive synthetic workload."] , assessment: [{"type": "Architecture", "q": "Explain the difference between Direct-Mapped, Set-Associative, and Fully-Associative caches.", "a": "Direct-Mapped: Each memory address maps to exactly one cache line (high conflict misses). Fully-Associative: A memory address can be placed anywhere in the cache (lowest miss rate, but massive hardware comparator cost). Set-Associative: A hybrid where an address maps to a specific 'set', but can be placed in any of the 'N' ways within that set (e.g., 4-way), balancing hit rate and hardware complexity."}, {"type": "Architecture", "q": "What is a Miss Status Holding Register (MSHR)?", "a": "An MSHR is a hardware structure used in non-blocking caches. When a cache miss occurs, instead of stalling the entire processor, the miss is allocated an MSHR entry to track the pending memory request. The cache can then continue serving other independent hits. When the data returns from main memory, the MSHR routes it to the cache and the waiting instruction."}, {"type": "RTL", "q": "How do you handle a cache write-miss in a Write-Back, Write-Allocate cache?", "a": "1. Fetch the entire cache line from main memory into the cache (Write-Allocate). 2. If the chosen cache line is currently 'dirty' (modified), write it back to main memory first. 3. Once the new line is in the cache, write the new data into the cache line and mark it as 'dirty'. Main memory is not updated until this line is evicted later."}] }

          {
            id: 'm3', number: 3, title: 'AMBA AXI & Core Integration',
            intro: "Convert your isolated core into a true System-on-Chip capable of high-bandwidth memory access.",
            milestone: "Wrap the RISC-V core memory interfaces in AXI4 Master protocols. Design a 2x2 AXI Crossbar and run the compliance suite.",
            context: "NVIDIA's massive chips rely on highly complex, high-bandwidth interconnects (like NVLink). AXI is the foundational industry standard you must master first.",
            skills: [80, 75, 20, 35, 50],
            weeks: [
              { id: 'w9', n: 9, task: "<strong>AXI4 Deep Dive:</strong> Master the 5 channels (AW, AR, W, R, B) and VALID/READY handshakes.", subtasks: ["Read the AMBA AXI4 specification focusing on burst types and handshaking.", "Write a simple AXI4 Master VIP in SystemVerilog to generate transactions.", "Implement an AXI4 Slave memory model to respond to read/write requests.", "Simulate back-to-back burst transfers and verify VALID/READY protocol compliance."] , assessment: [{"type": "Architecture", "q": "What are the 5 independent channels in the AXI4 protocol?", "a": "1. Read Address (AR), 2. Read Data (R), 3. Write Address (AW), 4. Write Data (W), 5. Write Response (B). Because they are independent, AXI supports full-duplex communication and outstanding (pipelined) transactions."}, {"type": "RTL", "q": "Explain the AXI VALID/READY handshake mechanism.", "a": "The source asserts VALID when the data/address payload is stable. The destination asserts READY when it is able to accept the payload. A transfer only occurs on the clock edge where BOTH VALID and READY are high (1). Crucially, VALID must not wait for READY to be asserted (to prevent deadlocks), but READY can wait for VALID."}, {"type": "Architecture", "q": "What is an AXI Burst transfer?", "a": "A burst transfer allows a master to send a single address and then transfer multiple sequential data beats (up to 256 in AXI4). This maximizes memory bandwidth utilization by amortizing the address phase overhead across many data transfers, which is critical for cache line fills."}] },
              { id: 'w10', n: 10, task: "<strong>AXI Wrappers:</strong> Convert your L1 Cache misses into AXI4 burst transactions.", subtasks: ["Design the interface logic between the L1 cache controller and the AXI Master.", "Implement the state machine to translate cache line fetches into AXI read bursts.", "Handle write-back operations by generating AXI write bursts for dirty lines.", "Verify the wrapper by simulating cache misses resolving through the AXI interface."] , assessment: [{"type": "RTL", "q": "How do you translate a cache line miss into an AXI transaction?", "a": "The cache controller asserts ARVALID, placing the missed cache line's base address on ARADDR, setting ARLEN to the number of beats required to fill the line (e.g., 3 for a 4-beat burst), and ARSIZE to the bus width. It waits for ARREADY. Then it waits for RVALID data beats, capturing them into the cache SRAM until RLAST is asserted."}, {"type": "RTL", "q": "Why is the Write Response (B) channel necessary in AXI?", "a": "Because AXI supports outstanding and out-of-order transactions, the Master needs confirmation that a specific write transaction successfully reached the Slave and was committed (or if it resulted in an error, like an invalid address). The B channel provides this status (BRESP) after the final WLAST data beat is sent."}, {"type": "Verification", "q": "How do you verify AXI protocol compliance?", "a": "Using an AXI Verification IP (VIP) or writing SystemVerilog Assertions (SVA). Assertions check rules like: 'Once VALID is asserted, it cannot be de-asserted until READY is seen', and 'Data payload cannot change while VALID is high and READY is low'."}] },
              { id: 'w11', n: 11, task: "<strong>Interconnect Design:</strong> Build a custom AXI crossbar with round-robin arbitration.", subtasks: ["Design the address decode logic to route transactions to multiple slaves.", "Implement a round-robin arbiter to resolve conflicts between multiple masters.", "Construct the multiplexing datapath for the 5 AXI channels.", "Run a multi-master simulation to verify fair bandwidth allocation and no deadlocks."] , assessment: [{"type": "Architecture", "q": "What is the role of an AXI Interconnect/Crossbar?", "a": "It acts as a router connecting multiple AXI Masters (e.g., CPUs, DMAs) to multiple AXI Slaves (e.g., RAM, Peripherals). It decodes the address from a Master to route the transaction to the correct Slave, and arbitrates between multiple Masters trying to access the same Slave simultaneously."}, {"type": "RTL", "q": "How does a round-robin arbiter work?", "a": "It grants access to requesters in a circular, sequential order. If Master 0 is granted access, the next priority goes to Master 1, then Master 2, etc. This ensures fairness and prevents starvation, guaranteeing that every master will eventually get access to the bus, unlike fixed-priority arbitration."}, {"type": "Physical", "q": "Why are wide, highly-multiplexed crossbars problematic for physical design?", "a": "A fully connected crossbar requires massive multiplexers. In physical layout, this means routing hundreds or thousands of wires (e.g., 256-bit data buses) to a central location. This causes severe routing congestion, high wire capacitance, and deep logic cones, making it very difficult to meet high-frequency timing constraints."}] },
              { id: 'w12', n: 12, task: "<strong>Validation:</strong> Hook up a simulated main memory. Run riscv-compliance tests via Verilator C++ DPI.", subtasks: ["Integrate the RISC-V core, AXI crossbar, and simulated memory into a top-level SoC.", "Set up the Verilator C++ DPI environment to load ELF binaries into memory.", "Script an automated test runner for the official riscv-tests compliance suite.", "Debug failing tests until the core achieves 100% pass rate on RV32IM."] , assessment: [{"type": "Verification", "q": "What is DPI-C and why is it used in SoC verification?", "a": "DPI-C (Direct Programming Interface) allows SystemVerilog to directly call C/C++ functions, and vice versa. It is used to integrate fast C++ reference models (like a memory simulator or an instruction set simulator) into the RTL testbench, allowing the testbench to load ELF binaries, generate golden expected results, or interact with the host OS."}, {"type": "Verification", "q": "What is the purpose of the `riscv-compliance` test suite?", "a": "It is a standardized set of assembly programs provided by the RISC-V foundation. Running it proves that your custom RTL core correctly implements the ISA specification (e.g., all edge cases of arithmetic, branching, and memory alignment), ensuring software compiled for RISC-V will run flawlessly on your hardware."}, {"type": "Architecture", "q": "What is Memory-Mapped I/O (MMIO)?", "a": "MMIO assigns specific physical memory addresses to hardware peripherals (like a UART, timer, or accelerator) instead of RAM. When the CPU reads or writes to these specific addresses, the interconnect routes the transaction to the peripheral's control registers, allowing software to configure and control hardware devices using standard load/store instructions."}] }

      {
        id: 'phase2', number: 2, title: 'Physical Design Bridge', subtitle: 'Months 4–6',

        accent: '#818cf8', quarterId: 'Q2',
        months: [
          {
            id: 'm4', number: 4, title: 'Synthesis & Static Timing (STA)',
            intro: "The transition from logical code to physical gates. Learn to constraint your design for frequency targets.",
            milestone: "Synthesize the Q1 SoC using Yosys. Write custom .sdc files targeting 300MHz. Refactor RTL to fix all Setup time violations.",
            context: "This bridges the Hybrid gap. Writing architecture without understanding STA leads to unroutable, slow chips. NVIDIA values architects who write timing-aware RTL.",
            skills: [80, 80, 45, 40, 50],
            weeks: [
              { id: 'w13', n: 13, task: "<strong>Yosys Automation:</strong> Script Yosys to map your SystemVerilog to the Skywater 130nm standard cell library.", subtasks: ["Write a Yosys synthesis script (`synth.ys`) to read the SoC RTL files.", "Configure Yosys to map the design to the Sky130 `lib` files.", "Run synthesis and review the generated netlist and area reports.", "Analyze the logs to ensure zero inferred latches and no combinational loops."] , assessment: [{"type": "Architecture", "q": "What is the difference between scalar, superscalar, and vector (SIMD) processors?", "a": "A scalar processor executes one instruction on one data element per cycle. A superscalar processor executes multiple independent scalar instructions per cycle. A vector (SIMD) processor executes a single instruction on multiple data elements simultaneously (e.g., adding four pairs of 32-bit floats in one cycle), exploiting data-level parallelism efficiently."}, {"type": "Architecture", "q": "What is strip-mining in vector processing?", "a": "Strip-mining is a technique used when the length of a vector operation (e.g., an array of 1000 elements) exceeds the hardware's maximum vector register length (e.g., 64 elements). The compiler generates a loop that processes the data in 'strips' of 64 elements, and a final cleanup iteration for the remainder (1000 % 64 = 40 elements)."}, {"type": "RTL", "q": "How do you implement a parameterized SIMD ALU in SystemVerilog?", "a": "Use a `generate` block with a `for` loop to instantiate multiple scalar ALUs (lanes) based on a parameter `NUM_LANES`. The input vectors are sliced (e.g., `A[i*32 +: 32]`) and fed into each lane, and the outputs are concatenated back into a vector register."}] },
              { id: 'w14', n: 14, task: "<strong>Constraints (SDC):</strong> Write .sdc files. Define create_clock, set_input_delay, and identify set_false_path across CDC boundaries.", subtasks: ["Draft the primary `create_clock` constraint targeting a 300MHz frequency.", "Define `set_input_delay` and `set_output_delay` for all top-level I/O ports.", "Identify and constrain asynchronous CDC paths using `set_false_path`.", "Verify the SDC syntax using a linting tool or OpenSTA parser."] , assessment: [{"type": "Architecture", "q": "What is a Tensor Core and why is it faster than a standard SIMD FMA unit?", "a": "A Tensor Core is a specialized execution unit designed specifically for matrix multiplication (GEMM), the core operation in deep learning. While a standard SIMD unit might perform 4 independent Fused Multiply-Adds (FMAs) per cycle, a Tensor Core performs a 4x4 matrix multiply-accumulate (D = A*B + C) in a single cycle, executing 64 FMAs simultaneously by hardwiring the systolic data flow."}, {"type": "Architecture", "q": "What is mixed-precision computing in machine learning hardware?", "a": "Mixed-precision computing uses lower precision formats (like FP16, BF16, or INT8) for the inputs and multiplications (which require less memory bandwidth and smaller multipliers), while accumulating the results in a higher precision format (like FP32 or INT32) to prevent underflow/overflow and maintain model accuracy."}, {"type": "RTL", "q": "How do you implement a basic systolic array processing element (PE)?", "a": "A systolic PE typically contains a multiplier, an adder (for accumulation), and registers. In each cycle, it receives an input from the left (e.g., matrix A), an input from the top (e.g., matrix B), multiplies them, adds the result to its internal accumulator (or passes it down), and forwards the inputs to the right and bottom PEs for the next cycle."}] },
              { id: 'w15', n: 15, task: "<strong>STA Analysis:</strong> Use OpenSTA. Analyze timing reports. Find the critical path (Worst Negative Slack).", subtasks: ["Load the synthesized netlist and SDC constraints into OpenSTA.", "Generate setup and hold timing reports across worst-case PVT corners.", "Identify the top 10 critical paths contributing to Worst Negative Slack (WNS).", "Document the logic cones and cell delays causing the timing violations."] , assessment: [{"type": "Architecture", "q": "What is memory coalescing in GPU architecture?", "a": "Memory coalescing occurs when multiple threads in a warp (e.g., 32 threads) access consecutive memory addresses simultaneously. The memory controller combines these individual requests into a single, wide memory transaction (e.g., a 128-byte burst), drastically improving memory bandwidth utilization compared to 32 separate, uncoalesced 4-byte requests."}, {"type": "Architecture", "q": "What causes bank conflicts in shared memory?", "a": "Shared memory is divided into equally sized memory banks that can be accessed simultaneously. A bank conflict occurs when multiple threads in a warp attempt to access different addresses that map to the *same* memory bank. The hardware must serialize these requests, reducing effective bandwidth. Accessing the exact same address (broadcast) is typically optimized and does not cause a conflict."}, {"type": "RTL", "q": "How do you design a memory controller to support coalescing?", "a": "The controller needs a coalescing buffer or queue. When a load/store request arrives, it checks if the address falls within the same cache line as a pending request. If so, it merges the byte-enables and data into the existing request. If not, it allocates a new entry. It then issues full cache-line sized requests to the main memory interface."}] },
              { id: 'w16', n: 16, task: "<strong>RTL Refactoring:</strong> Break up deep logic cones in your AXI crossbar or ALU. Add pipeline registers to close timing.", subtasks: ["Refactor the ALU to add an intermediate pipeline stage for complex operations.", "Restructure the AXI crossbar arbitration logic to reduce combinational depth.", "Re-run Yosys synthesis and OpenSTA to verify timing improvements.", "Iterate until the design achieves a positive WNS at the target frequency."] , assessment: [{"type": "Architecture", "q": "What is a Warp (or Wavefront) in GPU execution?", "a": "A warp is a group of threads (typically 32 in NVIDIA GPUs) that execute the exact same instruction simultaneously in lockstep (SIMT - Single Instruction, Multiple Threads). They share a single program counter but have their own registers and execution state."}, {"type": "Architecture", "q": "What is warp divergence and how does it impact performance?", "a": "Warp divergence occurs when threads within the same warp take different paths in a conditional branch (e.g., `if-else`). Because they share a program counter, the hardware must serialize execution: first executing the `if` path (masking out threads that took `else`), then executing the `else` path (masking out the `if` threads). This significantly reduces utilization and performance."}, {"type": "RTL", "q": "How do you implement thread masking for divergent branches in RTL?", "a": "The hardware maintains an 'active mask' register for each warp. When a branch occurs, the condition is evaluated for all threads. The mask is updated: threads evaluating to true stay active (1), others are masked (0). The execution units use this mask to disable write-backs for masked threads. A hardware stack is used to push/pop masks to handle nested branches."}] }

          {
            id: 'm5', number: 5, title: 'ASIC Floorplanning & Routing',
            intro: "Get hands-on with the backend Physical Design flow used to generate actual silicon layouts.",
            milestone: "Push the SoC through OpenLane. Create a valid floorplan, define the Power Delivery Network (PDN), and achieve successful detailed routing.",
            context: "Physical designers at NVIDIA spend days battling routing congestion. Experiencing this teaches you how to architect cleaner interconnects at the RTL level.",
            skills: [80, 80, 70, 45, 60],
            weeks: [
              { id: 'w17', n: 17, task: "<strong>OpenLane Setup:</strong> Install the <a href='https://github.com/The-OpenROAD-Project/OpenLane' target='_blank' class='text-cyan-400 hover:underline'>OpenLane</a> RTL-to-GDSII flow docker environment.", subtasks: ["Install Docker and pull the latest OpenLane container image.", "Set up the SkyWater 130nm PDK workspace within the OpenLane environment.", "Create the initial `config.tcl` file defining the project parameters.", "Run a test synthesis pass through OpenLane to verify toolchain functionality."] , assessment: [{"type": "Architecture", "q": "What is the difference between Symmetric Multiprocessing (SMP) and Non-Uniform Memory Access (NUMA)?", "a": "In SMP, all processors share a single centralized memory pool and have equal access latency to it. In NUMA, memory is distributed among 'nodes' (often per socket). A processor can access its local memory very quickly, but accessing remote memory (attached to another node) incurs higher latency via an interconnect."}, {"type": "Architecture", "q": "What is Amdahl's Law?", "a": "Amdahl's Law states that the theoretical maximum speedup of a program using multiple processors is limited by the sequential (non-parallelizable) portion of the program. If 10% of a program is strictly sequential, the maximum speedup is 10x, regardless of how many cores you add."}, {"type": "Physical", "q": "What are the physical challenges of scaling to many cores on a single die?", "a": "Key challenges include: 1. Power density and thermal dissipation (dark silicon). 2. Routing congestion for the global interconnect (NoC) and memory controllers. 3. Clock distribution (skew and jitter across a massive die). 4. Yield issues (larger dies have a higher probability of manufacturing defects)."}] },
              { id: 'w18', n: 18, task: "<strong>Floorplanning:</strong> Define die area, core utilization, and place macro blocks (SRAM) manually via config.tcl.", subtasks: ["Configure the core utilization target (e.g., 65%) and aspect ratio.", "Manually place the L1 cache SRAM macros near the core logic.", "Define the Power Delivery Network (PDN) grid for VDD and VSS.", "Run the floorplan stage and visually inspect the layout in KLayout."] , assessment: [{"type": "Architecture", "q": "Why is cache coherence necessary in a multi-core processor?", "a": "When multiple cores have their own private L1/L2 caches, they might cache the same memory address. If Core A modifies its cached copy, Core B's cached copy becomes stale (incorrect). Cache coherence protocols ensure that all cores see a consistent, unified view of memory, typically by invalidating or updating other copies when a write occurs."}, {"type": "Architecture", "q": "Explain the states in the MESI protocol.", "a": "Modified (M): The cache line is valid, modified (dirty), and this is the ONLY copy in the system. Exclusive (E): The cache line is valid, clean (matches main memory), and this is the ONLY copy. Shared (S): The cache line is valid, clean, and other caches MAY also have a copy. Invalid (I): The cache line is not valid."}, {"type": "RTL", "q": "How does a snooping coherence protocol work?", "a": "All caches monitor (snoop) a shared bus. When a core wants to write to a Shared line, it broadcasts an 'Invalidate' signal on the bus. All other caches snooping the bus check if they have that line; if so, they transition their state to Invalid. The writing core then transitions to Modified."}] },
              { id: 'w19', n: 19, task: "<strong>Clock Tree Synthesis (CTS):</strong> Run CTS. Analyze clock skew and insertion delay reports.", subtasks: ["Execute the placement stage to distribute standard cells.", "Run TritonCTS to synthesize a balanced clock tree network.", "Analyze the CTS reports to verify acceptable clock skew and insertion delay.", "Adjust CTS buffering constraints if hold violations are introduced."] , assessment: [{"type": "Architecture", "q": "Why use a Directory-based coherence protocol instead of Snooping for many-core systems?", "a": "Snooping relies on a broadcast bus, which doesn't scale well beyond a few cores due to bandwidth limitations and power consumption (every cache must check every transaction). A directory protocol uses a centralized (or distributed) directory to explicitly track which caches hold copies of a block. Point-to-point messages are sent only to the specific caches that need them, scaling efficiently to dozens or hundreds of cores."}, {"type": "Architecture", "q": "What information is stored in a directory entry?", "a": "A directory entry typically stores the state of the memory block (e.g., Uncached, Shared, Modified) and a 'sharer vector' or list of pointers indicating exactly which core(s) currently have a copy of that block in their private caches."}, {"type": "Verification", "q": "What are common race conditions in directory coherence protocols?", "a": "Race conditions often occur due to interconnect delays. For example, Core A requests a block, the Directory sends it, but before it arrives, Core B requests exclusive access to the same block. The protocol must handle these transient states (e.g., using NACKs or forwarding requests) to prevent deadlocks and ensure sequential consistency."}] },
              { id: 'w20', n: 20, task: "<strong>Routing:</strong> Execute global and detailed routing. Resolve routing congestion hot-spots.", subtasks: ["Run FastRoute for global routing and identify congestion heatmaps.", "Execute TritonRoute for detailed routing of all signal nets.", "Analyze the routing logs for DRC violations or unrouted nets.", "Tweak placement density or macro positions to resolve any routing bottlenecks."] , assessment: [{"type": "Architecture", "q": "What is a Network-on-Chip (NoC) and why is it used instead of a crossbar?", "a": "A NoC is a packet-switched network (like a miniature internet) connecting cores, caches, and memory controllers on a die. Crossbars don't scale physically or logically to many nodes (wires grow as N^2). NoCs use routers and links arranged in topologies (mesh, ring, torus) to provide scalable, high-bandwidth, concurrent communication."}, {"type": "Architecture", "q": "Explain the difference between Store-and-Forward and Wormhole routing.", "a": "Store-and-Forward: A router waits to receive the entire packet before forwarding it to the next node (high latency, requires large buffers). Wormhole routing: A packet is divided into smaller 'flits' (flow control units). The header flit establishes the path, and subsequent data flits follow immediately, pipelining the packet across multiple routers (low latency, small buffers)."}, {"type": "RTL", "q": "What is Virtual Channel (VC) flow control in a NoC?", "a": "Virtual Channels multiplex multiple independent logical queues over a single physical link. If one packet is blocked (e.g., waiting for a downstream resource), packets in other VCs can bypass it using the same physical wires. This dramatically reduces head-of-line blocking and improves network throughput, and is essential for preventing protocol-level deadlocks (e.g., separating request and response networks)."}] }

          {
            id: 'm6', number: 6, title: 'Sign-off & Tape-Out Run',
            intro: "Finalize the physical layout. Prove the chip is manufacturable and functionally correct post-routing.",
            milestone: "Achieve 0 DRC/LVS violations. Generate final GDSII file. Run a post-layout gate-level simulation with SDF timing back-annotation.",
            context: "Having a verified, DRC-clean GDSII layout of an out-of-order processor proves elite capability. It is the ultimate proof of a Hybrid skill set.",
            skills: [85, 80, 85, 50, 65],
            weeks: [
              { id: 'w21', n: 21, task: "<strong>Physical Verification:</strong> Run Magic VLSI. Fix specific DRC violations (antenna rules, spacing).", subtasks: ["Stream out the routed layout to a GDSII file.", "Run Magic VLSI to perform a comprehensive Design Rule Check (DRC).", "Identify and analyze any antenna rule or metal spacing violations.", "Apply routing detours or insert antenna diodes to fix the DRC errors."] , assessment: [{"type": "Architecture", "q": "What are the primary purposes of Virtual Memory?", "a": "1. Isolation/Protection: Each process gets its own private, contiguous virtual address space, preventing it from accessing or corrupting other processes' memory or the OS kernel. 2. Abstraction: Programs don't need to know physical memory layout. 3. Overcommitment: The OS can run programs larger than physical RAM by paging inactive data to disk (swap)."}, {"type": "Architecture", "q": "Explain the concept of Paging and Page Tables.", "a": "Virtual and physical memory are divided into fixed-size blocks called Pages (typically 4KB). The OS maintains a Page Table for each process, which maps Virtual Page Numbers (VPNs) to Physical Page Numbers (PPNs). When a CPU accesses a virtual address, the hardware translates it using the Page Table before accessing physical RAM."}, {"type": "Architecture", "q": "What is a Page Fault?", "a": "A page fault occurs when the hardware attempts to translate a virtual address, but the Page Table indicates the page is not currently resident in physical memory (the 'valid' bit is 0). The hardware traps to the OS, which must fetch the page from disk into RAM, update the Page Table, and restart the instruction."}] },
              { id: 'w22', n: 22, task: "<strong>LVS Sign-off:</strong> Use Netgen to ensure the physical layout matches your synthesized netlist perfectly.", subtasks: ["Extract the SPICE netlist from the final GDSII layout using Magic.", "Run Netgen to compare the extracted netlist against the synthesized Verilog.", "Debug any LVS mismatches (e.g., missing power connections or shorts).", "Achieve a completely clean LVS report indicating structural equivalence."] , assessment: [{"type": "Architecture", "q": "What is a Translation Lookaside Buffer (TLB) and why is it critical for performance?", "a": "A TLB is a small, extremely fast, fully-associative hardware cache dedicated solely to storing recent virtual-to-physical page translations (VPN to PPN). Without a TLB, every memory access would require multiple additional memory reads just to traverse the Page Table, crippling performance. The TLB provides the translation in a single cycle for hits."}, {"type": "Architecture", "q": "What happens on a TLB miss?", "a": "If a translation is not in the TLB, a 'page walk' must occur to find it in the Page Table in main memory. This can be handled by software (the CPU traps to an OS handler) or hardware (a dedicated Hardware Page Walker state machine traverses the table). Once found, the translation is loaded into the TLB, potentially evicting an older entry."}, {"type": "RTL", "q": "How is a TLB typically implemented in hardware?", "a": "As a Content Addressable Memory (CAM) paired with an SRAM. The VPN is broadcast to all entries in the CAM simultaneously. If a match occurs, the CAM outputs a one-hot signal that selects the corresponding PPN and access permissions from the SRAM array."}] },
              { id: 'w23', n: 23, task: "<strong>Gate-Level Sim (GLS):</strong> Export the SDF file. Run Verilator on the netlist to verify functionality with physical delays.", subtasks: ["Generate the Standard Delay Format (SDF) file from OpenSTA.", "Compile the gate-level netlist with the Sky130 simulation library in Verilator.", "Back-annotate the SDF delays into the simulation environment.", "Run the riscv-compliance test suite to ensure functional correctness post-routing."] , assessment: [{"type": "Architecture", "q": "Explain how a multi-level (radix) page table works.", "a": "A flat page table for a 64-bit address space would be impossibly large. A multi-level table breaks the VPN into chunks. The first chunk indexes into the Level 1 table, which contains a pointer to the base of a Level 2 table, and so on. This creates a sparse tree structure, saving massive amounts of memory because unallocated virtual regions don't require page table entries."}, {"type": "RTL", "q": "What is the role of a Hardware Page Walker (PTW)?", "a": "A PTW is an autonomous state machine in the MMU. On a TLB miss, it takes the faulting VPN and the base address of the root page table (e.g., from the SATP register in RISC-V). It automatically issues AXI read requests to memory to traverse the multi-level page table hierarchy, fetches the final PPN, and installs it in the TLB, entirely without software intervention."}, {"type": "Verification", "q": "How do you verify an MMU and Page Walker?", "a": "Verification requires setting up complex memory structures in the testbench. You must create valid and invalid page table trees in simulated memory, then issue virtual memory requests from the CPU. You verify that TLB hits return instantly, TLB misses trigger correct PTW memory accesses, page faults generate the correct exception codes, and permission violations (e.g., writing to a read-only page) are caught."}] },
              { id: 'w24', n: 24, task: "<strong>PPA Extraction:</strong> Extract final Power, Performance, and Area metrics for your portfolio.", subtasks: ["Compile the final area utilization metrics from the routing reports.", "Extract the maximum achievable frequency (Fmax) from the final STA sign-off.", "Run a power analysis tool to estimate dynamic and leakage power consumption.", "Format the PPA results into a summary table for your portfolio README."] , assessment: [{"type": "Architecture", "q": "What is the difference between a physically indexed, physically tagged (PIPT) cache and a virtually indexed, virtually tagged (VIVT) cache?", "a": "PIPT uses physical addresses for both indexing and tagging; it's slow because translation (TLB) must finish before cache access begins. VIVT uses virtual addresses for both; it's fast (no TLB delay) but suffers from aliasing (two virtual addresses mapping to the same physical address) and requires flushing on context switches."}, {"type": "Architecture", "q": "What is a Virtually Indexed, Physically Tagged (VIPT) cache?", "a": "VIPT is the standard for L1 caches. It uses the page offset bits (which are identical in both virtual and physical addresses) to index the cache SRAMs *in parallel* with the TLB lookup. Once the TLB outputs the physical tag, it is compared against the physical tags read from the cache. This hides the TLB latency while avoiding VIVT aliasing issues."}, {"type": "Verification", "q": "What is UVM (Universal Verification Methodology)?", "a": "UVM is a standardized SystemVerilog class library used to build robust, reusable, coverage-driven verification environments. It provides base classes for components like Drivers, Monitors, Sequencers, and Scoreboards, and defines a standard phasing mechanism for test execution, making it the industry standard for verifying complex SoCs."}] }

            weeks: [
              { id: 'w25', n: 25, task: "<strong>SIMT Architecture:</strong> Study Warps, Thread Blocks, and divergence hardware. Read the <a href='https://resources.nvidia.com/en-us-tensor-core/nvidia-hopper-architecture-in-depth' target='_blank' class='text-cyan-400 hover:underline'>Hopper Architecture Whitepaper</a>.", subtasks: ["Read the Hopper Whitepaper focusing on the Streaming Multiprocessor (SM) design.", "Analyze the execution model of Warps and how thread divergence is handled.", "Study the integration of Tensor Cores within the SM datapath.", "Write a summary document detailing the scheduling differences between OoO CPUs and SIMT GPUs."] , assessment: [{"type": "Verification", "q": "What is the difference between a directed test and Constrained Random Verification (CRV)?", "a": "A directed test is manually written to check a specific scenario (e.g., write to address X, read from address X). CRV uses a solver to automatically generate randomized stimulus based on defined constraints (e.g., address must be word-aligned, data must be non-zero). CRV hits corner cases that engineers might not think to write directed tests for, drastically improving coverage."}, {"type": "Verification", "q": "What are the main phases in the UVM execution lifecycle?", "a": "UVM phases execute in order to ensure proper testbench setup. Key phases include: `build_phase` (instantiate components top-down), `connect_phase` (connect ports/exports bottom-up), `run_phase` (the only time-consuming phase where stimulus is generated and applied), and `extract/check/report_phase` (analyze results after simulation ends)."}, {"type": "Verification", "q": "What is the UVM Factory?", "a": "The UVM Factory is an object-oriented design pattern that allows you to substitute one class type with another (derived) class type at runtime without modifying the original testbench code. This is crucial for reusability; for example, you can override a standard error-injection driver with a custom one for a specific test."}] },
              { id: 'w26', n: 26, task: "<strong>CUDA Memory:</strong> Master Global memory coalescing, Shared Memory bank conflicts, and register pressure.", subtasks: ["Write a script to demonstrate the performance impact of uncoalesced global memory accesses.", "Design a CUDA kernel that utilizes Shared Memory to cache intermediate data.", "Analyze and resolve Shared Memory bank conflicts using padding techniques.", "Profile the kernel to observe how register allocation affects SM occupancy."] , assessment: [{"type": "Verification", "q": "Explain the relationship between a UVM Sequence, Sequencer, and Driver.", "a": "A `Sequence` generates abstract transaction objects (Sequence Items). It sends them to a `Sequencer`, which acts as a router/arbiter. The `Driver` continuously pulls transactions from the `Sequencer`, translates the abstract data into physical pin wiggles (RTL signals) according to the protocol (e.g., AXI), and sends a response back to the Sequence."}, {"type": "Verification", "q": "What is a `uvm_sequence_item`?", "a": "It is a class representing a single transaction or packet of data (e.g., an Ethernet frame or an AXI read request). It contains the data fields (declared with `rand` for randomization) and the constraints that define valid combinations of those fields."}, {"type": "Verification", "q": "How does the Driver communicate with the RTL Design Under Test (DUT)?", "a": "The Driver communicates with the DUT via a SystemVerilog `virtual interface`. The virtual interface acts as a pointer to the physical interface (the actual wires) instantiated in the top-level module, allowing the class-based UVM environment to drive static hardware signals."}] },
              { id: 'w27', n: 27, task: "<strong>Software Baseline:</strong> Write an optimized PyTorch/CUDA Matrix Multiply kernel.", subtasks: ["Implement a naive Matrix Multiply (GEMM) kernel in CUDA.", "Optimize the kernel using 2D block tiling and Shared Memory caching.", "Integrate the custom CUDA kernel into a PyTorch script via PyBind11.", "Generate golden input matrices and output results to hex files for RTL verification."] , assessment: [{"type": "Verification", "q": "What is the purpose of a UVM Monitor?", "a": "A Monitor is a passive component that observes the physical signals on the interface. It reconstructs the abstract transactions (Sequence Items) from the pin-level activity and broadcasts them to the rest of the testbench (like Scoreboards or Coverage collectors) via Analysis Ports, without ever driving the bus."}, {"type": "Verification", "q": "How does a UVM Scoreboard work?", "a": "A Scoreboard receives transactions from Monitors on both the input and output sides of the DUT. It uses a Reference Model (a high-level, golden implementation of the expected behavior, often written in C++ or SystemVerilog) to predict the expected output based on the input. It then compares the predicted output against the actual output from the DUT and reports mismatches."}, {"type": "Verification", "q": "What is a TLM Analysis Port?", "a": "Transaction Level Modeling (TLM) Analysis Ports are used for broadcast communication in UVM. A component (like a Monitor) writes a transaction to its Analysis Port. Any number of subscribers (Scoreboards, Coverage collectors) connected to that port will instantly receive a copy of the transaction via their `write()` method."}] },
              { id: 'w28', n: 28, task: "<strong>Profiling:</strong> Use Nsight Compute to profile your kernel. Identify memory vs. compute bounds.", subtasks: ["Run the optimized GEMM kernel through NVIDIA Nsight Compute.", "Analyze the Roofline model to determine if the kernel is memory or compute bound.", "Review the memory throughput and compute utilization metrics.", "Document the profiling results to establish a performance baseline for the hardware accelerator."] , assessment: [{"type": "Verification", "q": "What is the difference between Code Coverage and Functional Coverage?", "a": "Code Coverage is automatically collected by the simulator and measures how much of the RTL source code was executed (line, toggle, branch, FSM coverage). Functional Coverage is user-defined using `covergroups`; it measures whether specific design features, corner cases, or combinations of events specified in the verification plan have been exercised."}, {"type": "Verification", "q": "What is a `covergroup` and a `coverpoint` in SystemVerilog?", "a": "A `covergroup` is a construct used to define functional coverage models. Inside it, `coverpoints` specify specific variables or expressions to observe. You define `bins` within a coverpoint to track how many times a variable falls into specific ranges or hits specific values (e.g., `bins high_values = {[200:255]};`)."}, {"type": "Verification", "q": "What is Cross Coverage?", "a": "Cross coverage tracks the simultaneous occurrence of two or more coverpoints. For example, if you have a coverpoint for `instruction_type` (ALU, Load, Store) and a coverpoint for `register_index` (0-31), crossing them ensures that every type of instruction has been tested with every possible register."}] }

          {
            id: 'm8', number: 8, title: 'Systolic Tensor Array RTL',
            intro: "Design the core algorithmic accelerator mimicking modern Tensor Cores.",

            context: "AI acceleration is NVIDIA's current and future focus. A systolic array project proves you understand spatial computing — the physical manifestation of massive matrix math.",
            skills: [95, 88, 85, 50, 80],
            weeks: [
              { id: 'w29', n: 29, task: "<strong>Systolic Theory:</strong> Study the <a href='https://eyeriss.mit.edu/' target='_blank' class='text-cyan-400 hover:underline'>Eyeriss paper</a>. Compare Weight-Stationary vs. Output-Stationary dataflows.", subtasks: ["Read the Eyeriss paper to understand spatial architectures and data reuse.", "Diagram a Weight-Stationary dataflow mapping for a 2D systolic array.", "Compare the SRAM bandwidth requirements of different dataflow strategies.", "Define the architectural specifications for an 8x8 INT8 systolic array."] , assessment: [{"type": "Physical", "q": "What is Logic Synthesis?", "a": "Synthesis is the process of translating abstract, human-readable RTL (SystemVerilog) into a technology-specific gate-level netlist. The synthesis tool maps the RTL constructs to standard cells (NAND, NOR, DFF) provided in a foundry's standard cell library, optimizing for Area, Power, and Timing (PPA)."}, {"type": "Physical", "q": "What is the difference between a wireload model and physical synthesis?", "a": "Early logical synthesis uses wireload models (WLM) to estimate wire delays based purely on fanout, which is highly inaccurate in modern sub-micron nodes. Physical synthesis (or layout-aware synthesis) performs rough placement of the cells during synthesis to calculate much more accurate RC delays based on estimated wire lengths, leading to better timing closure."}, {"type": "RTL", "q": "Why might RTL that simulates perfectly fail in synthesis?", "a": "Common reasons include: 1. Inferring latches (missing `else` in combinational `always` blocks). 2. Multiple drivers on the same net. 3. Using non-synthesizable constructs (e.g., `initial` blocks, delays like `#5`, or `===`). 4. Combinational loops."}] },
              { id: 'w30', n: 30, task: "<strong>PE Design:</strong> Code the Processing Element (MAC + Local Register) in SV.", subtasks: ["Implement the INT8 multiplier and INT32 accumulator logic.", "Add local registers to hold stationary weights and pipeline activations.", "Implement zero-skip logic to gate the clock when the weight is zero.", "Write a unit testbench to verify the PE computes correct MAC results."] , assessment: [{"type": "Physical", "q": "Explain Setup Time and Hold Time.", "a": "Setup Time is the minimum amount of time the data input to a flip-flop must be stable BEFORE the active clock edge. Hold Time is the minimum amount of time the data must remain stable AFTER the active clock edge. Violating either causes metastability."}, {"type": "Physical", "q": "What is the Setup Time constraint equation?", "a": "T_clk_period >= T_clk_to_q + T_logic_delay + T_setup + T_skew. This means the clock period must be long enough to accommodate the time it takes data to leave the launch flop, travel through the combinational logic, and arrive at the capture flop with enough time to spare before the next clock edge."}, {"type": "Physical", "q": "How do you fix a Setup violation vs. a Hold violation?", "a": "Setup violations are fixed by making the data arrive FASTER (e.g., reducing logic depth, using faster/larger standard cells, or slowing down the clock frequency). Hold violations are fixed by making the data arrive SLOWER (e.g., inserting delay buffers in the data path). Hold violations are fatal and independent of clock frequency."}] },
              { id: 'w31', n: 31, task: "<strong>Array Generation:</strong> Use SV generate blocks to instantiate the 8x8 grid. Connect orthogonal data paths.", subtasks: ["Use SystemVerilog `generate` loops to instantiate 64 PEs in an 8x8 grid.", "Wire the horizontal activation paths and vertical accumulation paths.", "Implement the control logic to shift data into the array with correct skewing.", "Simulate the full array with a small synthetic matrix to verify data movement."] , assessment: [{"type": "Physical", "q": "What are the main steps in the Physical Design (Place and Route) flow?", "a": "1. Floorplanning (defining chip size, placing macros/SRAMs, creating power grid). 2. Placement (placing standard cells). 3. Clock Tree Synthesis (CTS - routing the clock to all flops with minimal skew). 4. Routing (connecting all cells with metal layers). 5. Signoff (final timing, DRC, LVS checks)."}, {"type": "Physical", "q": "What is Clock Tree Synthesis (CTS) and why is it difficult?", "a": "CTS is the process of distributing the clock signal from the PLL to millions of flip-flops across the die. The goal is to minimize Clock Skew (difference in arrival time at different flops) and Clock Insertion Delay. It's difficult because the clock net has massive fanout and capacitance, requiring a carefully balanced tree of clock buffers."}, {"type": "Physical", "q": "What is routing congestion?", "a": "Congestion occurs when the number of wires that need to pass through a specific physical area exceeds the available routing tracks in the metal layers. It often happens near complex crossbars or large macros. If the router cannot resolve it, it leads to Design Rule Check (DRC) shorts or unroutable nets."}] },
              { id: 'w32', n: 32, task: "<strong>Edge Buffers:</strong> Design the SRAM interface controllers to stream activations and weights into the array.", subtasks: ["Design the Global Buffer (GLB) SRAM wrappers to store input tensors.", "Implement the address generation logic to stream data into the array edges.", "Write the controller FSM to manage the loading, computing, and draining phases.", "Run a full simulation matching the hardware output to the PyTorch golden hex files."] , assessment: [{"type": "Physical", "q": "What is Static Timing Analysis (STA)?", "a": "STA is a mathematical technique used to validate the timing performance of a design without requiring simulation. It calculates the worst-case delays along all possible paths (from every launch flop to every capture flop) to ensure setup and hold constraints are met under all operating conditions (PVT corners)."}, {"type": "Physical", "q": "What are PVT corners?", "a": "Process, Voltage, and Temperature. Silicon performance varies based on manufacturing variations (Process: Fast/Slow), supply voltage (Voltage: High/Low), and operating temperature (Temperature: Hot/Cold). Signoff requires STA to pass across multiple extreme corners (e.g., Slow Process, Low Voltage, High Temp for worst-case setup)."}, {"type": "Physical", "q": "What are DRC and LVS?", "a": "DRC (Design Rule Check) ensures the physical layout obeys the foundry's manufacturing rules (e.g., minimum metal width, minimum spacing between wires). LVS (Layout Versus Schematic) extracts a netlist from the final physical layout shapes and compares it against the synthesized gate-level netlist to ensure no connections were broken or shorted during P&R."}] }

            milestone: "Design a 2D Mesh NoC router in SystemVerilog. Connect the Systolic Array and test maximum throughput under synthetic traffic.",
            context: "Advanced packaging and high-speed NoCs (like NVLink/NVSwitch) are how NVIDIA scales performance beyond a single reticle limit. This knowledge is highly sought after.",
            skills: [95, 92, 85, 55, 90],
            weeks: [
              { id: 'w33', n: 33, task: "<strong>NoC Theory:</strong> Study topologies, XY routing, and credit-based flow control.", subtasks: ["Research 2D Mesh topologies and the principles of dimension-order (XY) routing.", "Understand the mechanics of credit-based flow control for backpressure.", "Define the Flit (flow control unit) packet structure for the network.", "Draft a microarchitecture block diagram for a 5-port NoC router."] , assessment: [{"type": "Architecture", "q": "What are the three main layers of the PCIe protocol stack?", "a": "1. Transaction Layer (TL): Creates and processes Transaction Layer Packets (TLPs) for memory, I/O, and configuration requests. 2. Data Link Layer (DLL): Ensures reliable delivery of TLPs across the link using sequence numbers, CRCs, and an ACK/NAK retry mechanism. 3. Physical Layer (PHY): Handles the actual electrical signaling, 8b/10b or 128b/130b encoding, and link training."}, {"type": "Architecture", "q": "How does PCIe achieve high bandwidth compared to legacy parallel buses?", "a": "PCIe is a high-speed, point-to-point serial interconnect, rather than a shared parallel bus. It achieves high bandwidth by using differential signaling (immune to noise) at very high clock rates, and by aggregating multiple serial 'lanes' (e.g., x4, x8, x16) together to scale bandwidth linearly."}, {"type": "RTL", "q": "What is the purpose of the PCIe Replay Buffer?", "a": "Located in the Data Link Layer, the Replay Buffer stores a copy of every transmitted TLP. If the receiver detects a CRC error, it sends a NAK. The transmitter then pulls the TLP from the Replay Buffer and retransmits it. The TLP is only discarded from the buffer when an ACK is received."}] },
              { id: 'w34', n: 34, task: "<strong>Router Microarchitecture:</strong> Design virtual channels, input buffers, and the crossbar allocator.", subtasks: ["Implement the input buffer queues with Virtual Channel (VC) support.", "Design the route compute unit to calculate output ports based on XY coordinates.", "Code the switch allocator using a separable input-first/output-first arbiter.", "Implement the 5x5 crossbar multiplexer to route flits to output ports."] , assessment: [{"type": "Architecture", "q": "What is Compute Express Link (CXL) and how does it relate to PCIe?", "a": "CXL is a cache-coherent interconnect built on top of the physical and electrical layers of PCIe (starting with PCIe Gen5). While PCIe is great for bulk data transfer (DMA), CXL adds protocols (CXL.cache and CXL.mem) that allow accelerators (like GPUs) and the host CPU to seamlessly share memory and maintain cache coherence."}, {"type": "Architecture", "q": "Explain the three CXL sub-protocols.", "a": "1. CXL.io: Essentially standard PCIe, used for discovery, configuration, and legacy DMA. 2. CXL.cache: Allows an accelerator to cache host memory, with the host managing coherence. 3. CXL.mem: Allows the host CPU to access memory attached directly to the accelerator as if it were standard system RAM."}, {"type": "Architecture", "q": "Why is CXL critical for modern AI data centers?", "a": "It enables memory disaggregation and composability. Instead of memory being stranded inside specific servers, pools of memory can be connected via CXL switches and dynamically allocated to CPUs or GPUs as needed, vastly improving memory utilization and capacity for massive AI models."}] },
              { id: 'w35', n: 35, task: "<strong>Integration:</strong> Wrap your Systolic Array into a network node. Connect multiple dummy nodes.", subtasks: ["Design a Network Interface (NI) wrapper to packetize memory requests.", "Connect the Systolic Array to the local port of a NoC router.", "Instantiate a 2x2 mesh network connecting the accelerator to memory nodes.", "Simulate a transaction where the array fetches weights over the NoC."] , assessment: [{"type": "Architecture", "q": "What is High Bandwidth Memory (HBM) and how does it differ from GDDR?", "a": "HBM achieves massive bandwidth not by using extremely high clock speeds (like GDDR), but by using an ultra-wide interface (e.g., 1024 bits per stack). It achieves this by stacking multiple DRAM dies vertically using Through-Silicon Vias (TSVs) and placing the stack directly next to the GPU/CPU on a silicon interposer."}, {"type": "Physical", "q": "What is a Silicon Interposer?", "a": "An interposer is a piece of silicon used as a base to connect multiple chips (like a GPU and HBM stacks) side-by-side. It provides incredibly dense, microscopic routing layers that standard organic PCBs cannot achieve, enabling the thousands of wires required for the ultra-wide HBM interface."}, {"type": "Architecture", "q": "What is the 'Memory Wall'?", "a": "The Memory Wall refers to the growing disparity between the speed of processors (compute) and the speed/bandwidth of main memory. Over time, compute capability has scaled much faster than memory bandwidth, meaning modern processors (especially GPUs) often sit idle waiting for data to arrive. HBM is a primary technology used to overcome this."}] },
              { id: 'w36', n: 36, task: "<strong>Traffic Stress Test:</strong> Inject uniform and hot-spot traffic in Verilator. Monitor latency and throughput metrics.", subtasks: ["Write a C++ traffic generator to inject flits at varying injection rates.", "Simulate uniform random and hot-spot traffic patterns across the mesh.", "Add performance counters to track average flit latency and network throughput.", "Plot a latency vs. injection rate curve to identify the network saturation point."] , assessment: [{"type": "Architecture", "q": "What is a Chiplet architecture and why is the industry moving towards it?", "a": "Instead of building one massive, monolithic die (which has poor yield and high cost), a chiplet architecture breaks the SoC into multiple smaller, specialized dies (chiplets) that are manufactured separately and packaged together. This improves yield, lowers cost, and allows mixing different manufacturing nodes (e.g., 3nm for compute, 12nm for I/O)."}, {"type": "Physical", "q": "What is Advanced Packaging?", "a": "Advanced packaging refers to techniques used to connect chiplets together with high bandwidth and low latency. Examples include 2.5D integration (using a silicon interposer, like CoWoS) and 3D integration (stacking dies vertically using hybrid bonding or TSVs)."}, {"type": "Architecture", "q": "What is UCIe (Universal Chiplet Interconnect Express)?", "a": "UCIe is an open industry standard defining the physical layer, protocol stack, and software model for interconnecting chiplets within a package. It aims to create an interoperable ecosystem where chiplets from different vendors (e.g., an Intel CPU chiplet and an NVIDIA GPU chiplet) can be seamlessly packaged together."}] }

        months: [
          {
            id: 'm10', number: 10, title: 'UVM Framework Construction',
            intro: "Design is only half the job. Build a production-grade verification environment to prove your accelerator works.",
            milestone: "Construct a UVM Testbench for the Systolic Array. Implement Sequences, Drivers, and a C++ reference Predictor inside the Scoreboard.",
            context: "Architects and RTL designers at NVIDIA work hand-in-hand with Verification engineers. Knowing UVM makes you a vastly superior RTL designer because you write testable code.",
            skills: [95, 92, 85, 80, 90],
            weeks: [
              { id: 'w37', n: 37, task: "<strong>UVM OOP Setup:</strong> Learn UVM phases, uvm_component, and Factory registration.", subtasks: ["Set up a basic UVM testbench environment using EDA Playground or a local simulator.", "Create the base `uvm_env`, `uvm_agent`, and `uvm_test` classes.", "Implement the standard UVM phases (build, connect, run) in all components.", "Use the UVM factory to register and instantiate the testbench hierarchy."] , assessment: [{"type": "Software", "q": "What is the CUDA programming model?", "a": "CUDA is a parallel computing platform and API model created by NVIDIA. It allows software developers to use a CUDA-enabled GPU for general purpose processing (GPGPU). It extends C/C++ with keywords to define 'kernels' (functions that run on the GPU) and manage memory transfers between the host (CPU) and device (GPU)."}, {"type": "Software", "q": "Explain the CUDA thread hierarchy (Grid, Block, Thread).", "a": "A kernel is executed as a Grid of Thread Blocks. A Grid is a 1D, 2D, or 3D array of Blocks. A Block is a 1D, 2D, or 3D array of Threads. Threads within the same Block can synchronize and share data via Shared Memory. Blocks within a Grid execute independently and cannot safely synchronize with each other during kernel execution."}, {"type": "Software", "q": "What is the difference between `cudaMalloc` and `cudaMallocManaged`?", "a": "`cudaMalloc` allocates memory strictly on the GPU's device memory; the CPU cannot directly access it without explicit `cudaMemcpy` calls. `cudaMallocManaged` allocates Unified Memory, a single memory space accessible by both CPU and GPU. The CUDA driver automatically migrates the data pages to the processor that is actively accessing them."}] },
              { id: 'w38', n: 38, task: "<strong>Agents & Interfaces:</strong> Build active and passive AXI-Stream agents.", subtasks: ["Define the SystemVerilog virtual interface for the AXI-Stream bus.", "Implement the `uvm_sequence_item` defining the transaction properties.", "Code the `uvm_driver` to wiggle the interface pins based on sequence items.", "Write the `uvm_monitor` to passively sample the bus and broadcast transactions."] , assessment: [{"type": "Software", "q": "What is Shared Memory in CUDA and why is it used?", "a": "Shared Memory is a small, extremely fast, user-managed cache located on-chip within each Streaming Multiprocessor (SM). It is shared among all threads in a single Thread Block. It is used to drastically reduce global memory bandwidth by loading a chunk of data once from global memory into shared memory, having threads process it multiple times, and then writing the result back."}, {"type": "Software", "q": "How do you avoid shared memory bank conflicts in CUDA?", "a": "Shared memory is divided into 32 banks (one for each thread in a warp). If multiple threads in a warp access different addresses that map to the *same* bank, the accesses are serialized. To avoid this, you often pad arrays in shared memory (e.g., allocating `shared_array[32][33]` instead of `[32][32]`) to stagger the memory addresses and ensure threads access different banks."}, {"type": "Software", "q": "What is `__syncthreads()`?", "a": "It is a barrier synchronization intrinsic in CUDA. When called, all threads within the *same Thread Block* must reach this point before any thread can proceed. It is crucial when threads are collaborating via shared memory to ensure all threads have finished writing to shared memory before any thread attempts to read from it (preventing Read-After-Write hazards)."}] },
              { id: 'w39', n: 39, task: "<strong>Scoreboard & Reference Model:</strong> Implement a cycle-accurate C++ predictor to generate golden expected outputs.", subtasks: ["Design the `uvm_scoreboard` to receive transactions from the monitors.", "Integrate the C++ matrix multiply reference model via DPI-C.", "Implement the predictor logic to calculate expected outputs on the fly.", "Write the comparator logic to flag mismatches between RTL and the reference model."] , assessment: [{"type": "Software", "q": "What is a CUDA Stream?", "a": "A CUDA Stream is a sequence of operations (kernel launches, memory copies) that execute in order on the GPU. Operations in the *same* stream are strictly sequential. Operations in *different* streams can execute concurrently (overlapped) if the GPU has available resources, allowing you to hide memory transfer latency behind compute."}, {"type": "Software", "q": "How do you overlap data transfers with kernel execution?", "a": "You must use asynchronous memory copies (`cudaMemcpyAsync`), pinned (page-locked) host memory (`cudaHostAlloc`), and multiple CUDA streams. For example, in Stream 1 you copy chunk A to the GPU. Then, concurrently, Stream 1 executes a kernel on chunk A, while Stream 2 copies chunk B to the GPU."}, {"type": "Software", "q": "What is pinned (page-locked) memory?", "a": "Normally, host memory is pageable (the OS can swap it to disk). The GPU cannot safely use DMA to copy pageable memory because the OS might move it during the transfer. Pinned memory is locked in physical RAM. `cudaMemcpyAsync` requires pinned memory to allow the GPU's DMA engine to fetch data without CPU involvement."}] },
              { id: 'w40', n: 40, task: "<strong>Constrained Random:</strong> Write SV sequence blocks generating massive random matrices to stress the hardware.", subtasks: ["Create a `uvm_sequence` to generate random input matrices.", "Add constraints to test edge cases (e.g., highly sparse matrices, all zeros, max values).", "Implement a sequence to randomize backpressure by toggling the AXI READY signal.", "Run the sequences to verify the hardware handles back-to-back randomized traffic."] , assessment: [{"type": "Software", "q": "What is PTX (Parallel Thread Execution)?", "a": "PTX is NVIDIA's low-level, intermediate virtual instruction set architecture. CUDA C++ code is compiled into PTX by the NVCC compiler. The GPU driver then uses a Just-In-Time (JIT) compiler to translate the PTX into the specific machine code (SASS) for the actual GPU architecture it is running on. This provides forward compatibility."}, {"type": "Architecture", "q": "Why might you look at the PTX or SASS assembly code for your kernel?", "a": "To verify compiler optimizations. For example, you might check if the compiler successfully unrolled a loop, if it used specialized instructions (like Fused Multiply-Add or Tensor Core instructions), or to analyze register usage to understand why a kernel has low occupancy."}, {"type": "Software", "q": "What is register spilling in CUDA?", "a": "Each SM has a limited number of physical registers. If a kernel requires more registers per thread than are available (or more than the maximum allowed to achieve a desired occupancy), the compiler will 'spill' the excess variables into Local Memory. Local Memory physically resides in the slow, off-chip Global Memory, causing a massive performance penalty."}] }

      catch { return fallback; }
    };

    const phaseStats = (phase, done) => {
      let total = 0, completed = 0;
      phase.months.forEach(m => m.weeks.forEach(w => { total++; if (done[w.id]) completed++; }));
      return { total, completed, pct: total ? Math.round(completed / total * 100) : 0 };
    };

    // ===================== ATOMS =====================
    function ProgressBar({ pct, color = '#22d3ee', thin = false }) {
      return (
        <div className={`w-full bg-zinc-800 rounded-full overflow-hidden ${thin ? 'h-[3px]' : 'h-1.5'}`}>
          <div
            className="h-full rounded-full progress-fill"
            style={{ width: `${pct}%`, background: color }}
          />
        </div>
      );
    }

    function ProgressRing({ pct, size = 72, stroke = 5, color = '#22d3ee' }) {
      const r = (size - stroke) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (pct / 100) * circ;
      return (
        <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
          <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#1f2937" strokeWidth={stroke} />
          <circle
            cx={size / 2} cy={size / 2} r={r} fill="none"
            stroke={color} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={offset}
            strokeLinecap="round"
            className="ring-progress"
          />
        </svg>
      );
    }

    function Tag({ children }) {
      return (
        <span className="text-[10px] font-semibold tracking-widest uppercase px-2 py-0.5 rounded bg-zinc-800 text-zinc-400 border border-zinc-700">

    // ===================== RADAR CHART =====================
    function SkillChart({ skills }) {
      const chartRef = React.useRef(null);
      const canvasRef = React.useRef(null);
      const skillKey = skills ? skills.join(',') : '';

      React.useEffect(() => {
        if (!canvasRef.current || !skills) return;
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        chartRef.current = new Chart(canvasRef.current, {
          type: 'radar',
          data: {
            labels: ['Architecture', 'RTL Design', 'Physical (VLSI)', 'Verification', 'Systems (SoC)'],
            datasets: [{
              label: 'Skill Proficiency (%)',
              data: skills,
              backgroundColor: 'rgba(34, 211, 238, 0.15)',
              borderColor: 'rgba(34, 211, 238, 1)',
              pointBackgroundColor: '#000',
              pointBorderColor: '#22d3ee',
              pointHoverBackgroundColor: '#fff',
              pointHoverBorderColor: '#22d3ee',
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              r: {
                angleLines: { color: 'rgba(255,255,255,0.1)' },
                grid: { color: 'rgba(255,255,255,0.08)' },
                pointLabels: { font: { family: 'Inter', size: 10 }, color: '#a1a1aa' },
                ticks: { min: 0, max: 100, stepSize: 20, display: false, backdropColor: 'transparent' }
              }
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#18181b',
                borderColor: '#27272a',
                borderWidth: 1,
                padding: 10,
                callbacks: { label: ctx => ctx.raw + '% Readiness' }
              }
            }
          }
        });
        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [skillKey]);

      return (
        <div className="w-full h-[240px] relative">
          <canvas ref={canvasRef}></canvas>
        </div>
      );
    }
