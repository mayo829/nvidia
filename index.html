        <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>

            stroke={color} strokeWidth={stroke}

                    >
                      <span className="text-[9px] text-zinc-600 flex-shrink-0">{n.icon}</span>
                      <span className="text-[11px] font-medium truncate">{n.label}</span>
                      {isActive && <div className="ml-auto w-0.5 h-3 bg-cyan-400 rounded-full flex-shrink-0" />}
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {/* Overall progress */}
          <div className="px-4 py-3 border-t border-zinc-800 flex-shrink-0">
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-[9px] font-bold tracking-widest uppercase text-zinc-600">Overall Progress</span>
              <span className="text-[10px] font-semibold text-zinc-400">{pct}%</span>
            </div>
            <ProgressBar pct={pct} color="#22d3ee" thin />
            <p className="text-[9px] text-zinc-600 mt-1">{totalDone} / {totalWeeks} weeks complete</p>
          </div>
        </aside>
      );
    }

    // ===================== APP =====================
    function App() {
      const [tab, setTab] = useState('overview');
      const [done, setDone] = useState(() => load('completed-weeks', {}));

      useEffect(() => save('completed-weeks', done), [done]);

      const toggleWeek = useCallback((id) => {
        setDone(prev => ({ ...prev, [id]: !prev[id] }));
      }, []);

      const totalDone = Object.values(done).filter(Boolean).length;

      // Resolve month, quarter, or project view from tab id
      let activePhase = null, activeMonth = null, activeQuarterPhase = null;
      for (const p of PHASES) {
        if (tab === p.quarterId.toLowerCase()) { activeQuarterPhase = p; }
        for (const m of p.months) {
          if (m.id === tab) { activePhase = p; activeMonth = m; }
        }
      }
      const activeProject = PROJECTS.find(p => p.id === tab) || null;

      return (
        <div className="flex h-screen bg-black text-zinc-100 overflow-hidden font-sans antialiased">
          <Sidebar tab={tab} setTab={setTab} totalDone={totalDone} totalWeeks={48} done={done} />
          <main className="flex-1 overflow-y-auto h-full">
            <div className="p-6">
              {tab === 'overview'    && <OverviewTab done={totalDone} doneMap={done} total={48} />}
              {tab === 'foundations' && <FoundationsTab />}
              {tab === 'projects'    && <ProjectsOverviewTab />}
              {tab === 'interview'   && <InterviewTab />}
              {tab === 'citations'   && <CitationsTab />}
              {activeProject && <ProjectView project={activeProject} />}
              {activePhase && activeMonth && (
                <MonthView phase={activePhase} month={activeMonth} done={done} onToggle={toggleWeek} />
              )}
              {activeQuarterPhase && (
                <QuarterView phase={activeQuarterPhase} />
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
